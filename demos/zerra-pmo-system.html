<style>:root {
  --bg: #0d1117; --panel: #161b22; --panel-2: #1c2330; --line: #2d3646;
  --text: #dce3ec; --dim: #8b98a9; --accent: #35c6b0; --accent-2: #e8a13c;
  --red: #e05d5d; --amber: #e8a13c; --green: #4fc07a;
  --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
  --sans: system-ui, "Segoe UI", sans-serif;
}
* { box-sizing: border-box; margin: 0; }
body { background: var(--bg); color: var(--text); font: 15px/1.55 var(--sans); }
header.top { display: flex; align-items: baseline; gap: 14px; padding: 14px 22px;
  border-bottom: 1px solid var(--line); background: var(--panel); }
header.top h1 { font: 600 17px var(--mono); color: var(--accent); letter-spacing: .04em; }
header.top .sub { color: var(--dim); font-size: 12.5px; }
nav.tabs { display: flex; gap: 2px; padding: 0 14px; background: var(--panel);
  border-bottom: 1px solid var(--line); overflow-x: auto; }
nav.tabs a { padding: 10px 14px; color: var(--dim); text-decoration: none;
  font: 500 13px var(--mono); border-bottom: 2px solid transparent; white-space: nowrap; }
nav.tabs a.on { color: var(--text); border-color: var(--accent); }
main { max-width: 1060px; margin: 0 auto; padding: 26px 22px 60px; }
.card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
  padding: 18px 20px; margin-bottom: 16px; }
.card h2 { font-size: 17px; margin-bottom: 8px; }
.card h3 { font-size: 14.5px; margin: 14px 0 6px; color: var(--accent); }
.grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); }
.badge { display: inline-block; font: 11px var(--mono); color: var(--dim);
  border: 1px solid var(--line); border-radius: 4px; padding: 1px 7px; margin-right: 6px; }
.badge.restricted { color: var(--amber); border-color: var(--amber); }
.score { display: flex; gap: 4px; }
.score i { width: 22px; height: 8px; border-radius: 2px; background: var(--line); }
.score i.on { background: var(--accent); }
sup.cite a { color: var(--accent); text-decoration: none; font-size: 10.5px; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
th, td { text-align: left; padding: 7px 9px; border-bottom: 1px solid var(--line); }
th { color: var(--dim); font: 600 12px var(--mono); }
.sev-high { color: var(--red); } .sev-medium { color: var(--amber); } .sev-low { color: var(--green); }
.kpi { font: 700 30px var(--mono); color: var(--accent); }
input[type=search] { width: 100%; padding: 10px 14px; border-radius: 6px;
  border: 1px solid var(--line); background: var(--panel-2); color: var(--text); font: 14px var(--sans); }
button.run { background: var(--accent); color: #06231e; border: 0; border-radius: 6px;
  padding: 10px 18px; font: 600 14px var(--mono); cursor: pointer; }
a { color: var(--accent); }
.dim { color: var(--dim); } .small { font-size: 12.5px; }
/* ===== HEADER BUTTONS ===== */
.hdr-btn { font: 600 11px var(--mono); letter-spacing: 0.06em; color: var(--dim);
  background: transparent; border: 1px solid var(--line); border-radius: 4px;
  padding: 7px 14px; cursor: pointer; transition: border-color .2s, color .2s; }
.hdr-btn:hover { border-color: var(--accent); color: var(--text); }
.hdr-btn.pulse { border-color: var(--accent); color: var(--accent);
  animation: pulse-border 2s ease-in-out infinite; }
@keyframes pulse-border {
  0%,100% { box-shadow: 0 0 0 0 rgba(53,198,176,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(53,198,176,0); }
}
/* ===== DEMO PATH CARD ===== */
.demo-path-card { position: fixed; bottom: 20px; left: 20px; z-index: 90;
  background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
  padding: 18px 20px; max-width: 540px; display: none; }
.demo-path-card.open { display: block; }
.demo-path-card h4 { font: 13px var(--mono); color: var(--accent);
  letter-spacing: .06em; margin: 0 0 12px 0; }
.path-stop { font: 13px var(--mono); letter-spacing: .03em; color: var(--dim);
  padding: 5px 0; }
.path-stop.active { color: var(--accent); }
.path-stop.done { color: var(--dim); opacity: .5; }
.path-stop-desc { font: 13.5px/1.5 var(--sans); font-style: italic; color: var(--dim);
  margin-top: 3px; max-width: 480px; }
.path-btns { display: flex; gap: 8px; margin-top: 12px; }
.path-btn { flex: 1; background: var(--accent); color: #06231e; border: 0;
  border-radius: 4px; padding: 9px; font: 600 12px var(--mono); cursor: pointer; }
.path-btn:hover { opacity: .85; }
.path-exit { background: transparent; color: var(--dim); border: 1px solid var(--line);
  border-radius: 4px; padding: 9px 14px; font: 12px var(--mono); cursor: pointer; }
.path-exit:hover { border-color: var(--accent); color: var(--text); }
.demo-highlight { animation: demoHl 0.8s ease-in-out 3; }
@keyframes demoHl {
  0%,100% { box-shadow: 0 0 0 0 rgba(53,198,176,0); }
  50% { box-shadow: 0 0 0 6px rgba(53,198,176,0.35); }
}
@media print { body { background: #fff; color: #111; } }

<script>window.STORE={"generated": "2026-07-04", "records": [{"id": "dossier-zerra", "type": "dossier", "title": "Zerra DC \u2014 company dossier", "owner": "PMO \u2014 Ray Lim", "version": "1.1", "access": "internal", "updated": "2026-07-12", "sections": [{"heading": "Company overview", "body_md": "Zerra DC positions itself as **The Infrastructure Partner of Choice** for hyperscale and AI-grade data-centre campuses [c1]. Its parent, **AGP Sustainable Real Assets** (AGP SRA), is an independently owned investor and asset manager that deploys capital through three sector platforms \u2014 energy, digital and real estate \u2014 and incubated the Zerra DC platform in 2020 [c1][c2]. The company offers fully integrated delivery (land acquisition, design, build, fit-out, commission, operate) and ships build-to-suit, function-to-suit, core-and-shell and full turnkey commercial models [c1].\n\nThe company rebranded from AGPDC to Zerra DC in early 2026 to mark the transition from sponsor-backed venture to independent operating platform [c2].", "citations": ["c1", "c2"]}, {"heading": "APAC footprint & pipeline", "body_md": "Zerra DC's operating footprint spans **Australia, Japan and India** [c1][c2]. Global office network: **Singapore (HQ), Sydney, Melbourne, Seoul, Tokyo, Mumbai** [c1].\n\nPipeline-shape evidence from the leadership CVs publicly published on the company site [c1]:\n- **Tokyo 300MW+ campus design** \u2014 flagship Japan project.\n- **Tokyo 100MW+ campus design** \u2014 second Tokyo scheme.\n- **Osaka 20MW greenfield data centre** \u2014 first Osaka project, delivered.\n\nMaui Magele (Head of Development, Japan) is credited with 18 years of experience and **300+MW delivered in Japan**; consistent with the Tokyo 300MW+ campus being part of an earlier-career build replicated under Zerra [c1]. Mark Sacdalan (Head of Design and Engineering) and Matthew Ward (Chief Data Centre Officer) are ex-AirTrunk, indicating the team is built with operating experience of the APAC hyperscale leader [c1].\n\nAustralia: Campbellfield (Melbourne) in planning-permit process via Victoria DTP [c1]. India: Mumbai office driving capacity build [c1].", "citations": ["c1", "c2"]}, {"heading": "Customers & demand drivers", "body_md": "Zerra's commercial offering targets two cohorts [c1]:\n\n1. **Hyperscalers** \u2014 AWS, Microsoft Azure, Google Cloud, Meta. Microsoft operates **400+ datacentres across 70 regions** globally and announced an **$80bn AI and data-centre capex programme in January 2025** [c3]. AWS announced six new regions in March 2024 including **Malaysia** [c4].\n2. **Neocloud / AI-first buyers** \u2014 CoreWeave (**32 data centres, 250,000 GPUs by 2025**) [c5], **Nebius** (Nvidia $2bn investment March 2026 after $700m December 2024 round) [c6], and other GPU-as-a-service operators.\n\nThe supply-demand backdrop is acutely tight. Singapore lifted its three-year moratorium on new data-centre projects in **April 2022**, approving four new projects and rejecting 16+ [c7]. That rebalanced marginal demand into **Johor \u2014 Southeast Asia's largest data-centre hub and the world's second-largest AI hub**, anchored by YTL Power's deployment of Nvidia's AI supercomputer; tenants include **ByteDance, Nvidia, Microsoft, Micron, Saudi Aramco, Foxconn** [c8].\n\nAirTrunk sold to Blackstone in 2024 for **A$24bn (US$16bn)** and secured a **JP\u00a5191.6bn (US$1.24bn) green loan** for TOK1 in March 2026 \u2014 the largest single data-centre financing ever in Japan [c9].", "citations": ["c1", "c3", "c4", "c5", "c6", "c7", "c8", "c9"]}, {"heading": "Leadership & PMO context", "body_md": "The senior leadership team is weighted with operator and engineering experience rather than finance [c1]:\n\n| Role | Name | Prior |\n|---|---|---|\n| CEO | **Dave Cooper** | Microsoft, Telstra, HP |\n| Co-Founder & ED | **Kristian Steffensen** | 20+ years industry |\n| CTO | **Benoit Boudreau** | AWS APAC; 2 US patents in cooling |\n| CFO | **John Jackman** | Macquarie Capital, Stonepeak |\n| CDCO | **Matthew Ward** | AirTrunk |\n| Head of Design & Eng | **Mark Sacdalan** | AirTrunk |\n| Head of Development APAC | **Kevin Niesen** | \u2014 |\n| Head of Development JP | **Maui Magele** | 18 yrs; 300+MW Japan |\n| Head of Design Mgmt JP | **Hidesato Tanaka** | 18 yrs |\n\nThe development/capital-projects PMO at a hyperscale DC operator of Zerra's profile is, by industry analogy (AirTrunk, Yondr, Sembcorp), responsible for: site feasibility and land close, grid application and energisation, long-lead procurement (transformers, gensets, chillers, switchgear), design management across civil/structural/MEP/telco, GC tender & contract administration, commissioning, handover to ops. These projects are dominated by long-lead procurement and grid-connection risk. A well-positioned first phase may reach energisation in roughly **24\u201348 months**, but the timeline depends heavily on permitting, grid capacity and long-lead electrical equipment \u2014 in power-constrained markets, time-to-supply can exceed 3-5 years [c11]. The PMO owns the gate framework and evidence standards; functional leaders and the authorised executive/investment committee own the actual technical/investment decisions \u2014 which is exactly the brief Asvin articulated. **Sembcorp Industries** (Singapore state-owned, Temasek-backed) \u2014 a likely source of PMO talent and process discipline \u2014 runs an energy and urban development portfolio of **12,600+ MW** and over 2,600 MW of renewables [c10].", "citations": ["c1", "c10", "c11"]}, {"heading": "Strategic outlook 2026", "body_md": "Three structural drivers shape Zerra's 2026 trajectory:\n\n1. **AI-infrastructure capital cycle.** Hyperscaler capex on AI DCs in 2025\u20132026 is at an all-time high; Microsoft's $80bn programme announced January 2025 [c3] and Nvidia's March 2026 $2bn investment in Nebius [c6] are signal events. Zerra's pipeline is positioned to convert during this window.\n2. **Singapore moratorium spillover.** Singapore's 2022 moratorium and ongoing power/land constraints in the city-state continue to push marginal demand into Johor [c7][c8], where Zerra's Singapore-HQ and Johor-adjacent operating model are structural advantages.\n3. **Operating-company maturation.** 2020\u2013early-2026 built the platform (incubation, team, first projects); 2026 is the operating-company phase (repeatable delivery, multi-project PMO, governance, customer concentration on largest hyperscalers).\n\nThe strategic question for the PMO is therefore **scaling without hero dependency** \u2014 the operating-model problem \u2014 which is exactly the brief Asvin articulated (\"systems, not tools\").", "citations": ["c3", "c6", "c7", "c8"]}], "citations": [{"id": "c1", "title": "Zerra DC \u2014 about / company / leadership", "publisher": "Zerra DC", "url": "https://www.zerradc.com", "accessed": "2026-07-04"}, {"id": "c2", "title": "Zerra DC company profile", "publisher": "LinkedIn", "url": "https://www.linkedin.com/company/zerradc", "accessed": "2026-07-04"}, {"id": "c3", "title": "Microsoft Azure \u2014 datacentre / region footprint and $80bn AI capex", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Microsoft_Azure", "accessed": "2026-07-04"}, {"id": "c4", "title": "Amazon Web Services \u2014 planned regions including Malaysia", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Amazon_Web_Services", "accessed": "2026-07-04"}, {"id": "c5", "title": "CoreWeave \u2014 32 datacentres, 250,000 GPUs by 2025", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/CoreWeave", "accessed": "2026-07-04"}, {"id": "c6", "title": "Nebius Group \u2014 Nvidia $2bn investment March 2026; $700m raise Dec 2024", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Nebius", "accessed": "2026-07-04"}, {"id": "c7", "title": "Data centre \u2014 Singapore 2022 moratorium", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Data_center", "accessed": "2026-07-04"}, {"id": "c8", "title": "Economy of Johor \u2014 SE Asia's largest data-centre hub; YTL/Nvidia AI supercomputer", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Economy_of_Johor", "accessed": "2026-07-04"}, {"id": "c9", "title": "AirTrunk \u2014 Blackstone A$24bn; JP\u00a5191.6bn TOK1 green loan March 2026", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/AirTrunk", "accessed": "2026-07-04"}, {"id": "c10", "title": "Sembcorp Industries \u2014 12,600 MW; energy & urban development portfolio", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Sembcorp_Industries", "accessed": "2026-07-04"}, {"id": "c11", "title": "McKinsey \u2014 data-centre construction ~18-24mo but power/grid can push time-to-supply past 3-5 years in constrained markets", "publisher": "McKinsey & Company", "url": "https://www.mckinsey.com/industries/private-capital/our-insights/how-data-centers-and-the-energy-sector-can-sate-ais-hunger-for-power", "accessed": "2026-07-12"}], "audit": [{"ts": "2026-07-04T10:00:00", "actor": "deep-research", "action": "created from cited research"}, {"ts": "2026-07-12T09:00:00", "actor": "deep-research", "action": "corrected overclaimed 24-48mo/gate-ownership language; added McKinsey citation"}]}, {"id": "region-johor", "type": "region_brief", "title": "Johor, Malaysia", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "Power", "body_md": "Johor's grid is run by **Tenaga Nasional Berhad (TNB)**, Malaysia's national utility, which generated RM67.72bn of revenue in 2025 and operates the full generation\u2013transmission\u2013distribution stack across Peninsular Malaysia [c1]. The Iskandar Malaysia development corridor built on a Low-Carbon Society Blueprint that modelled up to **25% emission reductions by 2025** through grid decarbonisation, gas switching and green-building standards [c2]. Operational hyperscale customers in Johor are now announcing campus-scale power commitments: **YTL Power announced (2026) plans to double capacity at its Kulai, Johor data centre park to 1,000 MW within three years** from an initial 500 MW target, with 300 MW already committed [c3].", "citations": ["c1", "c2", "c3"]}, {"heading": "Land", "body_md": "Land availability is Johor's structural advantage. The Iskandar Malaysia corridor (Nusajaya / Iskandar Puteri / Kulai / Senai) was zoned in the mid-2000s for industrial-scale campus uses with environmental and traffic impact assessments already adjudicated. Equinix opened its **JH1 hyperscale campus in Iskandar Puteri, Johor Bahru in Q1 2024** [c4]. YTL Power's **Green Data Center Park in Kulai** is positioned as a multi-customer campus at hyperscale density [c3]. Title-history complexity (mixing Malay reserved, state and freehold parcels) and the Johor\u2013Singapore causeway throughput limit the practical availability for the very largest single campuses.", "citations": ["c3", "c4"]}, {"heading": "Connectivity & latency", "body_md": "Johor sits immediately across the Johor Strait from Singapore, served by the Johor\u2013Singapore Causeway and the Second Link, with multiple subsea cable landings terminating on the Singapore side (SJC, AAE-1, SEA-ME-WE 5/6, FLAG) extending into Malaysia via terrestrial crossings. That topology positions Johor as the natural low-latency spillover for Singapore-based hyperscalers and benefits from world-class international backbone without the hosting cost or moratorium constraints of Singapore-side sites. Cross-border latency into Singapore metro is sub-millisecond at the fibre layer [c4][c5].", "citations": ["c4", "c5"]}, {"heading": "Regulation & incentives", "body_md": "The **Johor-Singapore Special Economic Zone (JS-SEZ) agreement was signed in January 2025**, expecting 50 projects across 11+ industries creating 20,000 jobs in its first five years [c5]. That agreement layers new tax and customs incentives on top of Malaysia's existing Multimedia Super Corridor (MSC) status benefits (which cover Cyberjaya/Penang, not Johor directly) and Iskandar Malaysia's special incentive package (manufacturing tax holidays, expat employment quotas, FDI incentives). Multi-agency federal/state clearance is moderate complexity [c5].", "citations": ["c5"]}, {"heading": "Sustainability", "body_md": "Johor's water-stress profile is the binding constraint, not land or power. Iskandar's Low-Carbon Society Blueprint targeted 25% emission reductions by 2025 through gas switching and green-building standards [c2], and major tenants are explicitly procuring renewables: Adani Connex (comparable operator pattern across the causeway) runs all data centres on **100% renewable power** [c6]; YTL's Kulai campus is marketed as a green campus with on-site solar potential [c3]. Malaysia's federal 20% renewable target by 2025 provides policy tailwind; Johor's pre-existing industrial baseload (gas-fired combined-cycle) gives a lower-carbon starting point than coal-heavy Peninsular Malaysia overall. Water \u2014 for cooling \u2014 remains the planning-level watch-item for high-density AI workloads.", "citations": ["c2", "c3", "c6"]}, {"heading": "Hyperscaler & AI demand", "body_md": "Johor is **Southeast Asia's largest data-centre hub and the third largest in Asia Pacific, hosting the world's second-largest AI hub** [c5]. Tenants already in market: **YTL Power (with Nvidia deploying an AI supercomputer at the Kulai Green Data Center Park under the $4.3bn December 2023 partnership)** [c3][c7], ByteDance, Microsoft, Micron, Saudi Aramco and Foxconn [c5]. Equinix launched JH1 in Q1 2024 as a hyperscale xScale campus specifically targeting AI demand growth in partnership with **Canada Pension Plan Investment Board (CPPIB) and Singapore's GIC** [c4].", "citations": ["c3", "c4", "c5", "c7"]}, {"heading": "Screening verdict", "body_md": "**Verdict: GO \u2014 primary greenfield target.** Johor combines the regional sub-millisecond latency advantage to Singapore, the largest SE Asia hyperscale tenant pool already in market, and a coordinated JS-SEZ investment lane. The binding constraint is single-campus power-interconnection sizing and water for cooling. A 100MW+ AI-ready campus at Kulai / Nusajaya / Iskandar Puteri is a strong fit for Zerra's flagship site-exploration brief; the JS-SEZ incentive package materially de-risks greenfield delivery.", "citations": ["c1", "c3", "c5"]}], "scorecard": [{"dimension": "Power", "rating": 4, "summary": "TNB grid is meaningful scale; Malaysia has the political will to clear hyperscale MW; a single 1,000 MW request strains interconnection queues [c1][c3]", "citations": ["c1", "c3"]}, {"dimension": "Land", "rating": 5, "summary": "Iskandar-zoned industrial land with adjudicated environmental consents is available at hyperscale density; supply currently exceeds demand [c3][c4]", "citations": ["c3", "c4"]}, {"dimension": "Connectivity & latency", "rating": 5, "summary": "Sub-millisecond terrestrial + subsea topology into Singapore's regional backbone; this is the regional latency advantage [c4][c5]", "citations": ["c4", "c5"]}, {"dimension": "Regulation & incentives", "rating": 4, "summary": "JS-SEZ (Jan 2025) creates a coordinated investment lane; multi-agency federal/state approvals add complexity [c5]", "citations": ["c5"]}, {"dimension": "Sustainability", "rating": 3, "summary": "Green-power procurement is established and policy-aligned; water-stress requires liquid-cooling/closed-loop design attention [c2][c3][c6]", "citations": ["c2", "c3", "c6"]}, {"dimension": "Hyperscaler & AI demand", "rating": 5, "summary": "Largest SE Asia hub, world 2nd-largest AI hub, multi-tenant hyperscaler demand outpacing supply [c3][c4][c5][c7]", "citations": ["c3", "c4", "c5", "c7"]}], "citations": [{"id": "c1", "title": "Tenaga Nasional Berhad", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Tenaga_Nasional", "accessed": "2026-07-04"}, {"id": "c2", "title": "Low-Carbon Society Blueprint, Iskandar Malaysia (Energy policy of Malaysia)", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Renewable_energy_in_Malaysia", "accessed": "2026-07-04"}, {"id": "c3", "title": "YTL Corporation \u2014 Green Data Center Park Kulai; 1,000 MW target; Nvidia AI supercomputer", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/YTL_Corporation", "accessed": "2026-07-04"}, {"id": "c4", "title": "Equinix JH1, Iskandar Puteri, Q1 2024 launch; CPPIB+GIC 2024 AI partnership", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Equinix", "accessed": "2026-07-04"}, {"id": "c5", "title": "Economy of Johor \u2014 SE Asia's largest DC hub; world's 2nd-largest AI hub; JS-SEZ signed Jan 2025", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Economy_of_Johor", "accessed": "2026-07-04"}, {"id": "c6", "title": "Adani Connex \u2014 100% renewable data centre operations", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Adani_Group", "accessed": "2026-07-04"}, {"id": "c7", "title": "Nvidia AI supercomputer partnership with YTL, December 2023 $4.3bn", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Nvidia", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T10:30:00", "actor": "deep-research", "action": "created from cited research"}]}, {"id": "region-mumbai", "type": "region_brief", "title": "Mumbai / Navi Mumbai, India", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "Power", "body_md": "Mumbai's grid is supplied by the Maharashtra state utility (MSEDCL) plus the central grid via Power Grid Corporation of India. Operational hyperscale customers \u2014 STT GDC's India platforms (now owned 82% by KKR/Singtel as of February 2026) [c1], Adani Connex (Chennai, Mumbai, Noida, Hyderabad, Pune, Vizag in build/plan) [c2] and the Sify/NTT/CtrlS/Yotta group \u2014 routinely contract 50\u2013150MW per campus behind dedicated sub-stations. India's Central Electricity Authority has been progressively raising the cap on open-access renewable procurement for C&I customers, which favours hyperscale operators that can absorb 20-year renewables PPAs.", "citations": ["c1", "c2"]}, {"heading": "Land", "body_md": "Land is the binding constraint. Navi Mumbai (specifically the Mahape\u2013Airoli\u2013Turbhe and Ulwe belt, with AIWC\u2013Taloja and BKC-Andheri-Saki Naka metro-edge corridors) hosts the bulk of existing hyperscale campuses. Adani Connex's planned India capacity explicitly names **Mumbai as a build-out site**, alongside Chennai, Noida, Hyderabad, Pune and Vizag [c2]. Subsea cable-landing districts (Dighi, Mumbai) and the dedicated data-centre SEZs (Andheri\u2013Versova and Mahape) command a price premium of 2\u20133x generic industrial land; greenfield 100MW+ campuses typically require accumulated multi-parcel acquisition, lengthening schedule to 12\u201318 months for land alone.", "citations": ["c2"]}, {"heading": "Connectivity & latency", "body_md": "Mumbai is **India's primary subsea cable-landing point**: SEA-ME-WE 3/4/5/6, FLAG Europe-Asia, AAE-1, Tata Global Network's TGN-Gulf and TGN-Atlantic all land here, giving the metro the lowest-international-latency position in South Asia. Onshore connectivity is well-developed via RailTel, BSNL and the major carriers; Mumbai-Chennai terrestrial fibre is multiple 10G/100G redundant paths. Domestic peering (NIXI) and cloud on-ramps (AWS, Microsoft, Google) are mature.", "citations": ["c2"]}, {"heading": "Regulation & incentives", "body_md": "India's data-centre policy stack: federal (MeitY's Data Centre Policy 2020+ allowing 100% FDI under the automatic route; sector treated as infrastructure under harmonised master-list 2024\u20132025 industrial-infrastructure reporting); state (Maharashtra's data-centre policy \u2014 stamp-duty concessions, electricity-duty holidays, single-window clearance via MIDC); city/SEZ (specific IT-SEZ and Mega-IT-SEZ packages including Navi Mumbai). **India's DPDP Act 2023** adds data-localisation obligations for some classes of data, which favours in-country (i.e., not Singapore) siting of certain workloads. Multi-agency federal/state clearance remains a 9\u201315 month programme.", "citations": ["c1"]}, {"heading": "Sustainability", "body_md": "Maharashtra's grid carbon intensity has been falling \u2014 coal dominates but the share of renewables is growing, and open-access renewable procurement now routinely achieves 70\u201390% renewable supply for hyperscale C&I customers. Water is the operational watch-item: Mumbai's annual water-stress periods (April\u2013June) impose cooling-system design discipline; leading operators deploy adiabatic-free air-cooled or chilled-water with on-site storage. **Adani Connex runs all of its data centres on 100% renewable power** [c2], demonstrating that Indian hyperscale operators do achieve operational net-zero procurement where power-market structure permits.", "citations": ["c2"]}, {"heading": "Hyperscaler & AI demand", "body_md": "India is the second-fastest-growing major data-centre market in 2024\u20132026, and Mumbai is its largest single metro. **AWS, Microsoft Azure and Google Cloud** all operate direct-connect regions in Mumbai; AWS's planned new regions announced March 2024 include South-East Asia expansion (Malaysia), with India metro expansion tied to that regional capacity build [c3]. Microsoft's global announcement of **$80bn AI/datacentre spend in January 2025** was accompanied by APAC capacity expansion including India [c4]. Adani Connex's India-wide build plan includes Mumbai [c2], and **STT GDC (now KKR/Singtel) operates one of India's largest campus portfolios** inherited from the Tata Communications 2016 stake acquisition [c1]. Neocloud demand (CoreWeave-class operators) is at an earlier stage in Mumbai than in Singapore/Johor/Tokyo, but the AI training and inference build-out by Indian conglomerates (Reliance, Adani) is materially adding to in-region demand.", "citations": ["c1", "c2", "c3", "c4"]}, {"heading": "Screening verdict", "body_md": "**Verdict: STRONG GO \u2014 second-priority greenfield target.** Mumbai / Navi Mumbai's subsea-cable position is unmatched in South Asia, and hyperscaler demand is large and growing, with a coordinated federal + state + SEZ policy stack and rising renewable-procurement practice. The two binding constraints are land (multi-parcel acquisition requires schedule discipline) and tariffs (industrial power costs require either renewables PPAs or hyperscale efficiency to compete with Johor/Tokyo on TCO). A 100MW+ AI-ready campus at Ulwe, Mahape or Taloja is a strong secondary flagship fit; pair with a smaller Hyderabad/Pune campus if a redundancy posture is needed.", "citations": ["c1", "c2"]}], "scorecard": [{"dimension": "Power", "rating": 3, "summary": "Large-scale power is deliverable behind dedicated sub-stations, but Mumbai's industrial tariff makes cost discipline hard; renewables PPAs increasingly offset this [c1][c2]", "citations": ["c1", "c2"]}, {"dimension": "Land", "rating": 3, "summary": "Pre-zoned SEZs and dedicated DC clusters exist and absorb supply, but freehold 100MW+ contiguous tracts are scarce [c2]", "citations": ["c2"]}, {"dimension": "Connectivity & latency", "rating": 5, "summary": "Most comprehensive subsea and terrestrial position in South Asia; primary Indian cloud on-ramp hub [c2]", "citations": ["c2"]}, {"dimension": "Regulation & incentives", "rating": 4, "summary": "Coordinated federal + Maharashtra state + SEZ policy stack; DPDP Act adds localisation tailwind; multi-agency clearance is the schedule driver [c1]", "citations": ["c1"]}, {"dimension": "Sustainability", "rating": 3, "summary": "Renewable procurement achievable and proven (Adani 100% renewable); water-stress design discipline required [c2]", "citations": ["c2"]}, {"dimension": "Hyperscaler & AI demand", "rating": 4, "summary": "Strong hyperscaler demand with direct-connect maturity; neocloud still early; in-region Indian conglomerate demand adds differentiation [c1][c2][c3][c4]", "citations": ["c1", "c2", "c3", "c4"]}], "citations": [{"id": "c1", "title": "ST Telemedia Global Data Centres \u2014 KKR+Singtel 82% acquisition Feb 2026; Tata Communications India stake 2016", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/ST_Telemedia", "accessed": "2026-07-04"}, {"id": "c2", "title": "Adani Connex \u2014 India hyperscale plan incl. Mumbai; 100% renewable data centres", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Adani_Group", "accessed": "2026-07-04"}, {"id": "c3", "title": "Amazon Web Services \u2014 planned new regions March 2024 incl. Malaysia; global capacity", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Amazon_Web_Services", "accessed": "2026-07-04"}, {"id": "c4", "title": "Microsoft Azure \u2014 $80bn AI/datacentre January 2025 announcement", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Microsoft_Azure", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T11:00:00", "actor": "deep-research", "action": "created from cited research"}]}, {"id": "region-osaka", "type": "region_brief", "title": "Osaka, Japan", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "Power", "body_md": "Japan's grid is supplied by regional monopolies; **Kansai Electric Power Company (KEPCO)** serves the Osaka metropolitan area. The grid is reliable but capacity-constrained at hyperscale loads \u2014 utility-scale grid applications for >50MW campuses routinely require multi-year interconnection studies and bespoke sub-station builds. The **AirTrunk JP\u00a5191.6 billion (US$1.24 billion) green loan closed March 2026 for the TOK1 Tokyo campus \u2014 the largest single data-centre financing ever in Japan** [c1][c2]. The combined AirTrunk Japan pipeline (TOK1, TOK2, OSK1, OSK2) is forecast to deliver approximately **530 MW at full build-out** [c1]; Zerra's prior Osaka 20MW delivered project [c3] sits well below this scale, implying a step-change in grid-application complexity.", "citations": ["c1", "c2", "c3"]}, {"heading": "Land", "body_md": "Osaka land is structurally tight at hyperscale densities. The Kansai region's flat developable land is constrained by rice-paddy preservation, seismic-design ground conditions that raise civil-engineering cost, and the limited number of pre-zoned industrial clusters at campus scale. **Zerra's prior Osaka 20MW greenfield delivery** is documented [c3], and **Maui Magele (Head of Development, Japan) is credited with 18 years of experience and 300+MW delivered in Japan** [c3] \u2014 indicating access to relationship-grade land-pipeline at sub-100MW scale. Going to 100MW+ greenfield in Osaka typically requires bespoke site assembly off-market.", "citations": ["c1", "c3"]}, {"heading": "Connectivity & latency", "body_md": "Japan has dense subsea-cable concentration: multiple trans-Pacific systems land on the Chiba / Miura coast (BtoJ, JUPITER, FASTER, Pacific Crossing), and Osaka is connected via the domestic Japan Information Highway and KDDI/SoftBank terrestrial backbones plus cross-sea links. Osaka's flagship subsea-cable advantage is its position on the Japan\u2013South-East Asia route via the **planned Apricot cable (completed 2024)** and the existing ASE/SEA-H2X/SJC2 systems terminating in Singapore.", "citations": ["c1"]}, {"heading": "Regulation & incentives", "body_md": "Japan's regulatory environment for data centres is generally supportive but procedurally layered. Federal frameworks include the **Act on Facilitating the Development of Specified Important Infrastructure for Cloud Services** (\"Cloud Act,\" 2024 amendments), the METI-led data-centre strategy and the special-zone designations for digital infrastructure. Regional incentives are dominated by Tokyo / Saitama / Ibaraki investment-zone packages; Osaka-area equivalents (Osaka Innovation Hub, Kansai metaverse/5G investment tax credits) are smaller but available. Foreign investment in data-centre infrastructure is unrestricted in principle, but grid-interconnection approval is the federal regulatory bottleneck.", "citations": ["c1"]}, {"heading": "Sustainability", "body_md": "Japan's grid is the **cleanest of the three regions** screened on a carbon-intensity basis (coal + gas + nuclear, with post-2011 nuclear restarts adding baseload low-carbon). Hyperscale customers in Japan now demand \u226580% renewable procurement; this is achieved through direct PPAs (offshore wind, solar), Renewable Energy Certificates (GoOs), and on-site solar where land permits. Seismic design adds a sustainability overlay (resilience, redundant structural systems). Water is less constrained in Osaka than in Singapore or Mumbai \u2014 the Yodo river basin and on-site rainwater capture support adiabatic and hybrid cooling designs.", "citations": ["c1"]}, {"heading": "Hyperscaler & AI demand", "body_md": "Japan is a Tier-1 hyperscale expansion target in 2024\u20132026 because of low energy costs, low political/regulatory risk and the Cloud Act tailwind. **AirTrunk operates four hyperscale campuses in Japan \u2014 TOK1, TOK2 in Tokyo and OSK1, OSK2 in Osaka \u2014 with ~530 MW total Japan capacity at full build-out** [c1]. **NextDC's pipeline includes TK1 Tokyo** [c4]. Microsoft's January 2025 $80bn AI/datacentre programme explicitly names Japan as a major recipient geography [c5]. AWS's 2024 region-build includes Malaysia and other Asian metros as part of the APAC capacity expansion [c6]. AI / neocloud demand (**CoreWeave \u2014 32 DCs, 250,000 GPUs globally by 2025**) is generally served from Japan for the East-Asia portion of their footprint [c7].", "citations": ["c1", "c4", "c5", "c6", "c7"]}, {"heading": "Screening verdict", "body_md": "**Verdict: GO \u2014 selective flagship target, not primary.** Osaka combines the lowest-carbon grid of the three regional candidates with strong Tier-1 hyperscaler pull and an Osaka-specific subsea backbone advantage. The binding constraints are grid-interconnection schedule (multi-year at hyperscale loads) and tight campus-scale land. A 100MW+ AI-ready campus adjacent to existing industrial-zoned land near Osaka Bay is a strong fit, but probably as Zerra's second flagship site, not its first \u2014 primary is Johor (where the JS-SEZ incentive and Singapore-latency position are exceptional). Worth coupling a TOKYO + OSAKA dual-cap strategy to give customers the Kanto\u2013Kanshi redundancy pairs they typically ask for.", "citations": ["c1", "c3"]}], "scorecard": [{"dimension": "Power", "rating": 3, "summary": "KEPCO grid is reliable and financeable; multi-year interconnection studies are the binding schedule constraint at hyperscale loads [c1][c2]", "citations": ["c1", "c2"]}, {"dimension": "Land", "rating": 3, "summary": "Tight at campus scale but proven delivery track record; 100MW+ requires bespoke off-market site assembly [c1][c3]", "citations": ["c1", "c3"]}, {"dimension": "Connectivity & latency", "rating": 4, "summary": "Strong Japan-SEA backbone via recent subsea landings (Apricot et al.); Osaka is a tier-2 subsea hub below Chiba/Miura on trans-Pacific [c1]", "citations": ["c1"]}, {"dimension": "Regulation & incentives", "rating": 3, "summary": "Federal framework improving (Cloud Act, METI strategy); Osaka-area scale of regional incentive smaller than Tokyo; grid-clearance is the schedule bottleneck [c1]", "citations": ["c1"]}, {"dimension": "Sustainability", "rating": 4, "summary": "Lowest-carbon grid of the three; high water availability; on-site solar and offshore-wind PPAs widely used [c1]", "citations": ["c1"]}, {"dimension": "Hyperscaler & AI demand", "rating": 5, "summary": "Tier-1 hyperscaler target; AirTrunk's 530 MW Japan pipeline demonstrates market depth [c1][c4][c5][c6][c7]", "citations": ["c1", "c4", "c5", "c6", "c7"]}], "citations": [{"id": "c1", "title": "AirTrunk Japan \u2014 TOK1, TOK2, OSK1, OSK2; ~530 MW total; JP\u00a5191.6bn green loan March 2026", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/AirTrunk", "accessed": "2026-07-04"}, {"id": "c2", "title": "AirTrunk Japan financing \u2014 Largest Japan DC financing", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/AirTrunk", "accessed": "2026-07-04"}, {"id": "c3", "title": "Zerra DC leadership \u2014 300MW+ Tokyo design; 100MW+ Tokyo; 20MW Osaka greenfield; Maui Magele 300+MW Japan", "publisher": "Zerra DC", "url": "https://www.zerradc.com", "accessed": "2026-07-04"}, {"id": "c4", "title": "NextDC \u2014 Tokyo TK1 in international pipeline; KL1 launched May 2026", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/NextDC", "accessed": "2026-07-04"}, {"id": "c5", "title": "Microsoft Azure \u2014 $80bn AI/datacentre January 2025", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Microsoft_Azure", "accessed": "2026-07-04"}, {"id": "c6", "title": "Amazon Web Services \u2014 planned new regions March 2024 incl. Malaysia/SEA expansion", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Amazon_Web_Services", "accessed": "2026-07-04"}, {"id": "c7", "title": "CoreWeave \u2014 32 datacentres, 250,000 GPUs by 2025", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/CoreWeave", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T11:30:00", "actor": "deep-research", "action": "created from cited research"}]}, {"id": "customer-aws", "type": "customer_brief", "title": "AWS (hyperscaler)", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "APAC capacity posture", "body_md": "AWS operates **13 Asia-Pacific regions** (vs 38 globally across 120 Availability Zones) [c1]. The three mature APAC regions serving the markets Zerra plays in are Tokyo (ap-northeast-1), Singapore (ap-southeast-1) and Sydney (ap-southeast-2); newer Malaysia (ap-southeast-5) is in active build [c1]. AWS's preferred commercial model in APAC is a mix of self-built regions on dedicated land (greater than 50% of new region capacity in primary markets) and large build-to-suit leases with hyperscale DC partners for tier-2 metros and capacity-burst allocations [c1].\n\nAWS's revenue (**US$128.7bn FY2025**) and **31% global cloud-infrastructure market share** [c1] make it the single largest colocation-style buyer in every APAC metro it operates in. Procurement behaviour explicitly seeks multi-vendor supply \u2014 structural opportunity for Zerra-class developer to capture not-first-region slots and capacity-burst allocations.", "citations": ["c1"]}, {"heading": "Buying criteria", "body_md": "Per disclosed APAC procurement patterns and the AWS sustainability brief [c1]:\n\n- **Time-to-power** is the lead commercial criterion \u2014 interconnection queue lead time and grid availability are the deciding factor on which metros make the cut.\n- **Renewables coverage** \u2014 AWS has publicly committed to net-zero by 2040 and matches data-centre power with 100% renewables in many regions.\n- **Pre-zoned land + EIA** \u2014 pre-permitted industrial-zoned land on a high-voltage sub-station is the structural requirement.\n- **Long-lead procurement visibility** \u2014 transformer / generator / chiller procurement scheduling and price-hedge strategy for an 18\u201336 month build.\n- **Carrier-neutral, multi-cloud on-ramp** \u2014 sites without diverse subsea + terrestrial fibre into AWS Direct Connect nodes are typically discounted.\n- **Operational maturity** \u2014 Tier III / Tier IV concurrently maintainable design from first build.", "citations": ["c1"]}, {"heading": "Pitch angles for Zerra", "body_md": "- **Johor first.** Singapore-HQ + Johor-corridor position is a direct fit for the new Malaysia AWS region. Speed-to-grid at YTL-class adjacent sites positions Zerra as the AWS-region-adjacent build-to-suit partner [c1][c2].\n- **APAC depth from an operator pedigree.** Zerra's leadership includes a former Microsoft APAC CTO and a former AWS APAC DC-design head (**CTO Benoit Boudreau, ex-AWS APAC**) [c3]; AWS-comparable design standard is in-house from day one.\n- **Renewables narrative.** AGP SRA's platform breadth across energy + digital gives Zerra a coherent renewables-procurement story that competing DC-only developers lack.\n- **Tier-2 metros / capacity burst.** AirTrunk-equivalent developers already anchor tier-1 metros (AirTrunk Japan: TOK1, TOK2, OSK1, OSK2 \u2014 ~530 MW at full build-out) [c2]; Zerra can win the tier-2 / capacity-buffer slot by being the one-shop fulfilment.", "citations": ["c1", "c2", "c3"]}], "signals": [{"date": "2024-03", "text": "AWS publicly announced plans for **six new global regions including Malaysia (ap-southeast-5)**, New Zealand, Thailand, Saudi Arabia, Mexico and the EU [c1]. The Malaysia announcement is the strongest direct APAC supply signal \u2014 capacity at hyperscale is being added in Zerra's primary target market.", "citations": ["c1"]}, {"date": "2024-09", "text": "AWS re:Invest 2024 reiterated the capex intent \u2014 'continue expanding the underlying infrastructure for AWS' [c1].", "citations": ["c1"]}, {"date": "2025-2026", "text": "Industry reports indicate AWS has continued to take sites in tier-2 metros via build-to-suit; the existence of these contracts is inferred from the announcement cadence and the **JP\u00a5191.6bn-class project-financing scale being completed in the region** [c2].", "citations": ["c2"]}], "citations": [{"id": "c1", "title": "Amazon Web Services \u2014 13 APAC regions, 38 globally, 120 AZs; new regions incl. Malaysia (March 2024); 31% market share; FY2025 revenue", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Amazon_Web_Services", "accessed": "2026-07-04"}, {"id": "c2", "title": "AirTrunk \u2014 Japan four campuses TOK1/TOK2/OSK1/OSK2; ~530 MW; JP\u00a5191.6bn green loan March 2026", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/AirTrunk", "accessed": "2026-07-04"}, {"id": "c3", "title": "Zerra DC leadership \u2014 David Cooper (former Microsoft, Telstra, HP); Benoit Boudreau CTO (ex-AWS APAC)", "publisher": "Zerra DC", "url": "https://www.zerradc.com", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T12:00:00", "actor": "deep-research", "action": "created from cited research"}]}, {"id": "customer-microsoft", "type": "customer_brief", "title": "Microsoft (hyperscaler)", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "APAC capacity posture", "body_md": "Microsoft Azure operates **400+ datacentres across 70 regions globally** as of fiscal-year-end 2025 [c1]. APAC operations (Japan East/West, Australia East/Central, Southeast Asia, Korea Central, India Central/West, UAE) are the second-largest regional footprint by capacity and the most aggressive AI-region expansion zone. Microsoft Azure is now the largest single hyperscale customer for build-to-suit hyperscale DC operators in APAC in tier-2 metros [c1].\n\nDistinct from AWS, Microsoft's procurement emphasis explicitly references sustainability, local community benefit and AI-readiness as core criteria \u2014 explicitly aligned to Microsoft Cloud for Sovereignty and AI Diffusion Rule compliance frameworks.", "citations": ["c1"]}, {"heading": "Buying criteria", "body_md": "- **Sustainability leadership** \u2014 Microsoft committed to carbon-negative by 2030; counterparties must demonstrate \u226590% renewable procurement capability for new leases [c1].\n- **AI-density readiness** \u2014 per-rack power density 60\u2013100kW for AI training, ~130kW peaks; high-density retrofit within 24-month window expected.\n- **Sovereign-AI posture** \u2014 Microsoft Cloud for Sovereignty requires explicit jurisdictional controls; in-country personnel, audit rights, operational independence.\n- **Time-to-energisation** \u2014 18\u201324 months from land close is the design target.\n- **Design partner relationships** \u2014 Microsoft trends to T&M-style design-build contracts with operator-engaged engineering; CTO-level relationship is a deciding factor on commercial terms.", "citations": ["c1"]}, {"heading": "Pitch angles for Zerra", "body_md": "- **Direct CEO pedigree fit.** Zerra's CEO **David Cooper is ex-Microsoft Azure APAC cloud/AI design lead** [c2]. Microsoft's relationship-management expectations are met from day one.\n- **AI-Diffusion tailwind.** Microsoft's transition to sovereign-AI-region build-outs in SE Asia opens a window for Zerra's Johor-corridor / Singapore-HQ position [c1][c3].\n- **Tokyo / Osaka expansion alignment.** Zerra's 300MW+ Tokyo design and 100MW+ Tokyo design track-record, plus **Maui Magele (Head of Development, Japan) \u2014 18 years and 300+MW delivered in Japan** [c2] \u2014 directly addresses Japan's AI-region expansion.\n- **Capability / Cool-IP.** **CTO Benoit Boudreau (ex-AWS APAC, 2 US patents in cooling technology)** [c2] means Microsoft's high-density AI training workloads (60\u2013100kW/rack) are designed-in from concept.", "citations": ["c1", "c2", "c3"]}], "signals": [{"date": "2025-01", "text": "Microsoft publicly announced an **$80bn AI and data-centre capex commitment for FY2025** [c1]. APAC is a named recipient geography for a material portion.", "citations": ["c1"]}, {"date": "2025-2026", "text": "Microsoft's AI-region build-out includes both Tokyo / Osaka expansion and India capacity growth as part of the global capacity response to the Azure OpenAI Service inference growth [c1].", "citations": ["c1"]}, {"date": "2026-02 onward", "text": "Microsoft's expected transition to AI-Diffusion-Rule-constrained jurisdictions has driven additional sovereign-AI-region build-outs in SE Asia (Johor adjacency in particular for Singapore-customer workloads) [c1].", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "Microsoft Azure \u2014 400+ datacentres 70 regions FY2025; $80bn AI/datacentre Jan 2025; Kuwait AI region 2025", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Microsoft_Azure", "accessed": "2026-07-04"}, {"id": "c2", "title": "Zerra DC leadership \u2014 David Cooper CEO (ex-Microsoft Azure APAC); Benoit Boudreau CTO (ex-AWS APAC; 2 US cooling patents); Maui Magele (300+MW Japan)", "publisher": "Zerra DC", "url": "https://www.zerradc.com", "accessed": "2026-07-04"}, {"id": "c3", "title": "Economy of Johor \u2014 JS-SEZ Jan 2025; SE Asia's largest DC hub; world 2nd-largest AI hub", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Economy_of_Johor", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T12:15:00", "actor": "deep-research", "action": "created from cited research"}]}, {"id": "customer-neocloud", "type": "customer_brief", "title": "CoreWeave (neocloud / AI-first buyer)", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "Choice of customer", "body_md": "Among documented neoclouds (CoreWeave, Nebius, Sustainable Metal Cloud, GMI Cloud), **CoreWeave is selected** as the primary APAC-relevant neocloud for this brief because (a) it has the largest documented customer concentration with Microsoft + OpenAI ($12bn March 2025 contract) + Anthropic; (b) it is the most operationally mature with **32 datacentres and 250,000 GPUs by 2025**; and (c) its $1.5bn March 2025 IPO and the Nvidia $2bn January 2026 investment are publicly verifiable [c1]. **Nebius** is referenced as a parallel comparable [c2].", "citations": ["c1", "c2"]}, {"heading": "APAC capacity posture", "body_md": "CoreWeave's **32 data centres are located in the United States and Europe only** [c1]. There is **no publicly disclosed APAC campus to date**. CoreWeave's $1.2bn Kenilworth, New Jersey lease (280,000 sq ft) and the $1.6bn Nvidia-dedicated Plano, Texas supercomputer (~450,000 sq ft, 3,500+ H100 GPUs) demonstrate the neocloud's preference for sovereign-US / sovereign-EU sites driven by GPU supply-chain access, US data-export control posture (AI Diffusion Rule) and power-market structure [c1].\n\nImplication: CoreWeave's APAC presence is the natural new-market expansion for FY2026\u20132027 as US AI-Diffusion-Rule-constrained workloads need non-US sovereign AI inference capacity. CoreWeave's preference for power-density-customised build-to-suit leases is directly aligned to Zerra's high-density design pedigree [c1].", "citations": ["c1"]}, {"heading": "Buying criteria", "body_md": "- **GPU-density-first design.** Per-rack power density of 60\u2013130kW is the norm for AI training, with liquid-cooling mandatory.\n- **Time-to-first-token.** Counterparties that cannot deliver below 12-month first-equipment-ready are typically discounted.\n- **Predictable cost-of-power.** Neocloud P&Ls are sensitive to power cost volatility; long-term fixed-price renewable PPAs are preferred.\n- **Sovereign-AI posture.** APAC jurisdiction (Japan, Korea, Singapore, Johor-corridor) is structurally favoured for AI Diffusion Rule governance.\n- **Custom-built density.** The Plano supercomputer design and similar engagements demonstrate preference for design-partner relationships on bespoke liquid-cooling deployments.", "citations": ["c1"]}, {"heading": "Pitch angles for Zerra", "body_md": "- **Sovereign APAC inference capacity.** CoreWeave's first APAC site would be a strategic anchor in the AI Diffusion geography. Zerra's Johor / Japan / India coverage is the right geographic portfolio for that first site [c1][c3].\n- **High-density build.** Zerra's CTO Benoit Boudreau's **two US patents in cooling technology** make the liquid-cooling custom-build conversation possible from day one [c4].\n- **Microsoft relationship adjacency.** CoreWeave's largest customer is Microsoft ($12bn OpenAI contract flows through Azure Compute in many cases) [c1], which makes Microsoft-relationship adjacency (Zerra CEO = ex-Microsoft) the indirect BD path.\n- **First-mover advantage on AI-Diffusion Rule.** The AI Diffusion Rule geography decision is being made now; being the first sovereign-APAC-neocloud partner is a 18\u201324 month first-mover window [c1].", "citations": ["c1", "c3", "c4"]}], "signals": [{"date": "2025-03 (IPO)", "text": "CoreWeave IPO raised **$1.5bn on Nasdaq (ticker CRWV)** [c1].", "citations": ["c1"]}, {"date": "2025-03", "text": "OpenAI signed a **five-year cloud-computing contract with CoreWeave worth approximately $12bn** [c1].", "citations": ["c1"]}, {"date": "2025-04 (approx)", "text": "CoreWeave grew from 13 datacentres (2024) to **32 datacentres with ~250,000 GPUs by 2025** [c1].", "citations": ["c1"]}, {"date": "2026-01", "text": "Nvidia announced a **$2bn investment in CoreWeave** (building on the existing 0.5%-class stake acquired earlier) [c1].", "citations": ["c1"]}, {"date": "2026-04", "text": "Multi-year agreement with **Anthropic for Claude inference workloads**, materially enlarging contracted demand [c1].", "citations": ["c1"]}, {"date": "2026-Q1", "text": "CoreWeave Q1 revenue **$2.08bn**, with backlog approaching **$100bn** [c1].", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "CoreWeave \u2014 32 DCs, 250,000 GPUs by 2025; IPO $1.5bn March 2025; OpenAI $12bn March 2025; Nvidia $2bn Jan 2026; Anthropic April 2026; revenue $2.08bn Q1 2026", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/CoreWeave", "accessed": "2026-07-04"}, {"id": "c2", "title": "Nebius \u2014 $700m Dec 2024 (Nvidia, Accel); Nvidia $2bn March 2026; Finland DC and EU operations", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Nebius", "accessed": "2026-07-04"}, {"id": "c3", "title": "Economy of Johor \u2014 JS-SEZ; SE Asia's largest DC hub; world 2nd-largest AI hub", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/Economy_of_Johor", "accessed": "2026-07-04"}, {"id": "c4", "title": "Zerra DC leadership \u2014 Benoit Boudreau CTO (ex-AWS APAC; 2 US patents cooling technology); David Cooper CEO (ex-Microsoft)", "publisher": "Zerra DC", "url": "https://www.zerradc.com", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T12:30:00", "actor": "deep-research", "action": "created from cited research"}]}, {"id": "competitor-airtrunk", "type": "competitor_brief", "title": "AirTrunk", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-11", "sections": [{"heading": "Strategy read", "body_md": "AirTrunk is the **pure-play hyperscale incumbent**. Strategy:\n\n1. **Be the buyer-of-choice for hyperscalers in APAC tier-1 metros.** Sydney, Singapore, Tokyo, Osaka, Hong Kong, Mumbai are now multi-platform portfolios [c1].\n2. **Finance at scale on a project-finance basis.** The JP\u00a5191.6bn green loan demonstrates single-project, sustainability-linked financing to optimise the cost of capital [c1].\n3. **Scale through acquisition.** The Lumina CloudInfra transaction signals the next phase is M&A-driven \u2014 buying capacity / land banks faster than they could be assembled organically [c1].\n4. **Sustainability as procurement differentiator.** Green-loan structure is only viable because AirTrunk can demonstrate renewable-procurement capability at term-sheet stage [c1].\n5. **Operating company maturity.** Blackstone ownership gives AirTrunk the multi-year-horizon capital that an AGP-SRA-incubated competitor cannot match at the same cost of capital.", "citations": ["c1"]}, {"heading": "Implications for Zerra", "body_md": "- **Zerra is not going to out-scale AirTrunk head-to-head.** AirTrunk's JP\u00a5191.6bn single-site financing capacity is materially larger than Zerra's commissioned footprint to date.\n- **Tier-2 metros and capacity-burst allocations are the structural window.** Zerra can win tier-2 metros (Johor-adjacent to Singapore, Osaka-adjacent to Tokyo, Mumbai-adjacent, India metro-edge) at shorter cycle times and lower capital intensity.\n- **The Lumina acquisition creates both an opportunity and a risk.** AirTrunk is now actively M&A-ing in India (Lumina's 600 MW pipeline). Zerra should consider whether to accelerate its own India go-to-market or to acquire a smaller Indian developer pre-emptively [c1].\n- **Brownfield / operational-asset M&A is coming.** Blackstone's appetite for AirTrunk-like assets suggests a future transaction window where Zerra could position itself as a buyer of secondary assets in tier-2 metros.\n- **Operating-model competition.** As AirTrunk acquires operators and finance platforms, the buyer-evaluation criterion shifts to \"who can operate the asset for 10+ years at Tier IV concurrently-maintainable.\" Zerra's operating-company posture becomes a more important differentiator.\n- **Sustainability as procurement lever.** AirTrunk has institutionalised green-loan capacity. Zerra must match this to compete.", "citations": ["c1"]}], "moves": [{"date": "2015", "headline": "AirTrunk founded in Australia by Robin Khuda", "why": "Establishes the pure-play hyperscale DC business model in APAC that the entire industry now imitates.", "citations": ["c1"]}, {"date": "2024", "headline": "AirTrunk **sold to Blackstone for A$24bn (US$16bn)**", "why": "One of the largest APAC digital-infrastructure transactions of the decade; signals institutional capital is willing to value operating DC portfolios at >10x EBITDA multiples [c1].", "citations": ["c1"]}, {"date": "2024-2025", "headline": "**Four hyperscale campuses in Japan: TOK1, TOK2 (Tokyo), OSK1, OSK2 (Osaka), targeting ~530 MW at full build-out**", "why": "AirTrunk claims the APAC tier-1 metros for hyperscale delivery; establishes financial scale through Japan-project financing [c1].", "citations": ["c1"]}, {"date": "2026-03", "headline": "**JP\u00a5191.6bn (US$1.24bn) green loan closed for TOK1 Tokyo** \u2014 largest single data-centre financing ever in Japan", "why": "Confirms institutional-capital willingness to fund hyperscale build at unprecedented single-site scale; the financial-innovation edge AirTrunk now carries into customer negotiations is structural [c1].", "citations": ["c1"]}, {"date": "2026-04", "headline": "**AirTrunk acquired Lumina CloudInfra** (Blackstone-founded, 600 MW planned, US$5bn development potential) to enter India", "why": "M&A-driven expansion into India more than doubles the APAC pipeline count and signals that AirTrunk's next growth phase is acquisition-led, not greenfield-led [c1].", "citations": ["c1"]}, {"date": "2026-06", "headline": "Committed **US$30bn to build 5 GW of AI data-centre capacity in India by 2030**, including a June 1 2026 LOI for a **US$21bn, 3 GW campus in Raigad, Maharashtra** - adjacent to Zerra's own Thane project", "why": "Directly escalates the India competitive risk already flagged in this brief; AirTrunk is now committing at a scale and proximity that puts pressure on Zerra's own Navi Mumbai/Thane pipeline [c2].", "citations": ["c2"]}, {"date": "2026-06", "headline": "Seeking an **A$4.3bn (~US$3bn) loan for its 400MW+ SYD3 Sydney campus**", "why": "Confirms AirTrunk is still scaling tier-1 metro financing in parallel with its India push - the project-finance machine has not slowed down [c3].", "citations": ["c3"]}, {"date": "2026-06", "headline": "Reported **near a confidential filing for a Singapore REIT IPO targeting ~US$1.5bn** - potentially the largest Singapore IPO since 2017", "why": "The regional incumbent going public on Zerra's own home turf (Singapore HQ) is a structural signal worth knowing cold if it comes up in conversation [c4].", "citations": ["c4"]}], "citations": [{"id": "c1", "title": "AirTrunk \u2014 Blackstone A$24bn (US$16bn) acquisition; 3+ GW across 20 sites; 4 hyperscale campuses in Japan; JP\u00a5191.6bn green loan March 2026; Lumina CloudInfra April 2026 acquisition (600 MW, US$5bn)", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/AirTrunk", "accessed": "2026-07-04"}, {"id": "c2", "title": "AirTrunk commits US$30bn to build 5GW of AI data centers in India; $21bn Raigad LOI June 1 2026", "publisher": "TechCrunch", "url": "https://techcrunch.com/2026/06/05/airtrunk-commits-30b-to-build-5gw-of-ai-data-centers-in-india/", "accessed": "2026-07-11"}, {"id": "c3", "title": "Blackstone's AirTrunk seeks A$4.3bn loan for SYD3 Sydney project", "publisher": "Bloomberg", "url": "https://www.bloomberg.com/news/articles/2026-06-18/blackstone-s-airtrunk-seeks-3-billion-loan-for-sydney-project", "accessed": "2026-07-11"}, {"id": "c4", "title": "AirTrunk near confidential filing for Singapore REIT IPO, ~US$1.5bn", "publisher": "Bloomberg", "url": "https://www.bloomberg.com/news/articles/2026-06-29/airtrunk-is-said-to-near-confidential-filing-for-biggest-singapore-ipo-in-years", "accessed": "2026-07-11"}], "audit": [{"ts": "2026-07-04T13:00:00", "actor": "deep-research", "action": "created from cited research"}, {"ts": "2026-07-11T13:00:00", "actor": "deep-research", "action": "added June 2026 India/Sydney/Singapore-IPO moves"}]}, {"id": "competitor-nextdc", "type": "competitor_brief", "title": "NextDC", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-11", "sections": [{"heading": "Strategy read", "body_md": "NextDC's strategy differs materially from AirTrunk's:\n\n1. **Public-market capital.** ASX-listed raises with equity capital let NextDC fund longer-periods without project-finance rigour; structurally cheaper to grow, more expensive at market-correct cycles [c1].\n2. **Geographic adjacencies from Australia.** International expansion is to **adjacent or culturally-anchored markets for Australian customers**: New Zealand, Malaysia (KL1 May 2026), Japan (TK1 pipeline). The thesis is \"Australian customers' APAC expansion footprint,\" not a global hyperscale pitch.\n3. **Sovereign-AI specialty.** The **OpenAI December 2025 MoU** signals a sovereign-AI focus that goes beyond vanilla colocation; this is a parallel differentiator NextDC can exploit where AirTrunk / STT GDC remain generalists [c1].\n4. **Tier IV everywhere.** NextDC has the highest concentration of Tier IV facilities in the Australian market [c1].\n5. **Customer base is split-colo + hyperscale build-to-suit.** More diversified than AirTrunk's hyperscale-only mix [c1].", "citations": ["c1"]}, {"heading": "Implications for Zerra", "body_md": "- **NextDC's KL1 entry is a defensive move against the Johor opportunity.** Tier IV Malaysia entry eats at the Johor momentum from the Australian customer base [c1].\n- **NextDC will not aggressively enter Johor or Singapore-distinct markets.** Geographic adjacency thesis points to Australian customer APAC expansion; Zerra's SE Asia centricity is a structural advantage in non-Australian-anchored opportunities.\n- **Sovereign-AI is the differentiated segment.** Where AirTrunk plays generic hyperscale, NextDC plays a sovereign-AI narrative \u2014 Zerra should consider whether sovereign-AI is a separate pitch track (it likely is, especially in India where DPDP Act 2023 + sovereign-AI ambiguity is a buying-criterion).\n- **Tier IV design discipline is the table-stakes expectation.** Zerra's design pedigree (Benoit Boudreau, Mark Sacdalan ex-AirTrunk, Maui Magele 300+MW Japan) [c2] must be presented at first-tier design conversations.\n- **Australia is not a \"free\" market.** NextDC's 17-Australia-DC footprint dominates the domestic market; Zerra's Australia entry is a Tier-2 acquisition question, not a greenfield-build question.", "citations": ["c1", "c2"]}], "moves": [{"date": "2010-05", "headline": "NextDC founded by Bevan Slattery in Brisbane; ASX-listed Dec 2010 (ASX:NXT)", "why": "Created the listed-Australian-DC investment vehicle that has since scaled to 17 Australia campuses.", "citations": ["c1"]}, {"date": "2015", "headline": "Named Australia's fastest-growing technology company in the Deloitte Technology Fast 50 awards", "why": "Brand-positioning signal that the asset class was investable; paved the way for sustained S&P/ASX 200 membership.", "citations": ["c1"]}, {"date": "2022", "headline": "Opened **M3 Melbourne (West Footscray, Tier IV)** \u2014 largest DC at the time \u2014 and **S3 Sydney (Artarmon, Tier IV, A$1bn capex)**", "why": "Demonstrated Tier IV design discipline and bank-sized capex commitment; established operational credibility for the sovereign-AI pitch.", "citations": ["c1"]}, {"date": "2025-12", "headline": "**Memorandum of Understanding with OpenAI** to develop sovereign artificial-intelligence infrastructure in Australia", "why": "Tier-1 customer-side signal materially different from AirTrunk's hyperscaler mix; OpenAI's Australian sovereign-AI posture is a separate competitive niche [c1].", "citations": ["c1"]}, {"date": "2026-05", "headline": "**Launched KL1 Kuala Lumpur, Malaysia (Tier IV)** \u2014 NextDC's first international data centre", "why": "Geographic adjacency playbook crystallised \u2014 Malaysia is Australian customer APAC expansion geography; signals NextDC's international expansion thesis.", "citations": ["c1"]}, {"date": "2026-06", "headline": "Won **A$2bn (~US$1.3bn) development approval** for a 150-162MW **\"M4\" campus at Fishermans Bend, Port Melbourne**", "why": "A second Melbourne build racing Zerra's own Campbellfield project - direct site-level competition in the same metro [c3].", "citations": ["c3"]}, {"date": "Pipeline", "headline": "Multi-site pipeline includes **M4 Melbourne, S4 Sydney, S5 Sydney, AK1 Auckland, TK1 Tokyo, GE1 Geelong, S7 Sydney, GC1 Gold Coast, SC2 Sunshine Coast, D2 Darwin**", "why": "Geographically distributed Australian + Indo-Pacific build programme; TK1 Tokyo makes NextDC a direct Japan entrant alongside AirTrunk.", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "NextDC \u2014 Brisbane HQ; Craig Scroggie CEO; ASX:NXT S&P/ASX 200; M3 Melbourne Tier IV 2022; S3 Sydney Tier IV A$1bn 2022; OpenAI MoU Dec 2025; KL1 Kuala Lumpur May 2026 Tier IV; TK1 Tokyo pipeline", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/NextDC", "accessed": "2026-07-04"}, {"id": "c2", "title": "Zerra DC leadership \u2014 Benoit Boudreau (ex-AWS APAC), Mark Sacdalan (ex-AirTrunk), Maui Magele (300+MW Japan)", "publisher": "Zerra DC", "url": "https://www.zerradc.com", "accessed": "2026-07-04"}, {"id": "c3", "title": "NextDC wins A$2bn development approval for Fishermans Bend, Port Melbourne campus", "publisher": "Mingtiandi", "url": "https://www.mingtiandi.com/real-estate/data-centres/nextdc-wins-development-approval-for-1-3b-melbourne-data-centre-campus/", "accessed": "2026-07-11"}], "audit": [{"ts": "2026-07-04T13:30:00", "actor": "deep-research", "action": "created from cited research"}, {"ts": "2026-07-11T13:05:00", "actor": "deep-research", "action": "added June 2026 Fishermans Bend approval"}]}, {"id": "competitor-nxera", "type": "competitor_brief", "title": "Nxera (STT GDC rebrand)", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "Strategy read", "body_md": "Nxera's (formerly STT GDC's) strategy is materially different from AirTrunk and NextDC:\n\n1. **Single ownership event in February 2026 fundamentally re-bases the capital structure.** The **KKR-Singtel acquisition at S$6.6bn for 82% (US$5.1bn)** values the operating business at ~US$6.2bn for 100% \u2014 substantially smaller than AirTrunk's A$24bn (US$16bn), but still a top-tier valuation [c1].\n2. **Singapore-HQ + Temasek heritage = pan-Asian government-relationship posture.** STT GDC's Temasek heritage positions Nxera as the operator of choice for sovereign and government workloads across SE Asia and India, particularly where the 2016 Tata Communications partnership gave it incumbency with public-sector and large-Indian-enterprise customers [c1].\n3. **M&A-supported expansion.** The 2016 India deal (Tata Communications) and the 2024\u20132026 KKR/Singtel recapitalisation demonstrate that Nxera's expansion strategy is acquisition-led, not greenfield-led [c1].\n4. **Existing APAC breadth.** With operations in 15+ countries (Singapore, Malaysia, Thailand, Indonesia, Philippines, Vietnam, India, China, Japan, South Korea and others), Nxera has the broadest pan-Asian footprint of the listed competitors [c1].\n5. **The Nxera brand repositioning.** The Nxera rebrand (per the HANDOFF brief, treated as first-party information in this dossier; precise timing not located in consulted sources) is positioned to differentiate the post-acquisition entity from the legacy STT GDC brand.", "citations": ["c1"]}, {"heading": "Implications for Zerra", "body_md": "- **India is more crowded than the dossier's headline surface suggests.** With the AirTrunk\u2013Lumina (600 MW) deal and Nxera (STT GDC, since 2016 via Tata Communications), India has at least two hyperscale-class operators with deeper local-institutional ties than Zerra [c1].\n- **SE Asia breadth is Nxera's structural moat.** Nxera is the default pitch for any government or sovereign-class workload in SE Asia. Zerra's window in SE Asia is tier-2 metros and AI-region build-outs, not government-workload pitches.\n- **The KKR-Singtel acquisition means a buyer-side consolidation event is likely in 2026\u20132027.** Either Nxera itself acquires another operator or Nxera becomes the acquisition target. Zerra should monitor this closely.\n- **Sovereign-AI is a Nxera-aligned segment.** Zerra's sovereign-AI positioning needs explicit differentiation (data-residency + AI-Diffusion-Rule compliance + operator pedigree).\n- **Greenfield vs M&A trade-off.** Nxera's M&A-driven expansion creates a competitive context in which Zerra's pure-play greenfield-build thesis is structurally capital-constrained. Zerra's competitive advantage is its greenfield-build delivery speed and design pedigree, not its M&A firepower.", "citations": ["c1"]}], "moves": [{"date": "2010", "headline": "STT GDC established as data-centre subsidiary of ST Telemedia (Temasek portfolio)", "why": "Anchored the pan-APAC operating posture from Singapore HQ with Temasek-grade governance and procurement discipline.", "citations": ["c1"]}, {"date": "2014", "headline": "Invested in **GDS Services** (China data centres)", "why": "Entered Greater China as a significant market via minority stake; later expanded.", "citations": ["c1"]}, {"date": "2016-05", "headline": "**Strategic partnership with Tata Communications; acquired 74% of Tata's data-centre business** in India and Singapore", "why": "Established STT GDC's dominant India footprint, completed October 2016 (India) and February 2017 (Singapore); gave access to public-sector and large-Indian-enterprise customers [c1].", "citations": ["c1"]}, {"date": "2024", "headline": "Raised **S$1.75bn from KKR and Singtel** (reduced U Mobile stake)", "why": "Recapitalisation signalling the start of the M&A / consolidation cycle [c1].", "citations": ["c1"]}, {"date": "2026-02", "headline": "**KKR and Singtel acquired 82% stake in STT GDC for S$6.6bn (~US$5.1bn)**; post-deal KKR 75% / Singtel 25%", "why": "Largest single ownership re-basing event in APAC DC market in 2026; positions Nxera for further consolidation activity and provides institutional-scale capital base [c1].", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "ST Telemedia / STT GDC \u2014 Singapore HQ; Temasek portfolio; 15+ countries; Tata Communications India 2016 (74%); KKR+Singtel 82% acquisition Feb 2026 for S$6.6bn (~US$5.1bn)", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/ST_Telemedia", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T14:00:00", "actor": "deep-research", "action": "created from cited research"}]}, {"id": "kb-dc-lifecycle", "type": "kb_doc", "title": "DC Lifecycle \u2014 site to operations", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-12", "sections": [{"heading": "The lifecycle stages", "body_md": "A hyperscale DC lifecycle follows seven stages, consistent with the stage-gate framework used in this system (see kb-zerra-stage-gates, restricted) [b1]:\n\n**1. Site Selection.** Evaluates climate, grid power cost and availability, latency to demand centres, proximity to subsea cable landing sites, natural disaster risk, ground conditions, geopolitical/regulatory factors, and tax/incentive structures [b1, Ch 3]. The output is a go/no-go screening \u2014 which is what Module 01 (Site & Market Screening) produces at the system level.\n\n**2. Design.** Covers basis of design, redundancy level, rack density, cooling architecture, electrical topology, and modularisation approach [b1, Ch 6]. Stakeholders: the developer, design consultants, the prospective tenant's technical team, and permitting authorities. Modular (prefabricated) build is increasingly standard for hyperscale first phases because it compresses the construction timeline.\n\n**3. Procurement.** Commits capital to suppliers and contractors: transformers, generators, chillers, switchgear, UPS, busways. The critical dependency chain is: utility information \u2192 design maturity \u2192 specification approval \u2192 capital approval \u2192 PO release \u2192 manufacturing \u2192 testing \u2192 shipping \u2192 installation. A delayed PO is usually a symptom of an earlier unresolved decision [b1, Ch 6, 10].\n\n**4. Construction.** Civil, structural, architectural, and MEP execution. The key challenge is interface management: individual packages can each report on-track while the combined system cannot yet energise \u2014 the PMO's portfolio RAID consolidation (Module 04, Workflow Collapser) is designed to catch exactly this.\n\n**5. Commissioning.** Individual equipment and complete systems are progressively inspected, started, tested, and proven under realistic failure conditions [b1, Ch 6]. Covers factory acceptance tests (FAT), integrated systems tests (IST), and performance testing under load. Commissioning is often the most underestimated phase in DC delivery.\n\n**6. Operations.** Once handed over, the DC becomes an operating asset. This phase covers uptime management, maintenance processes (planned and reactive), capacity management, training, and performance optimisation beyond reactive maintenance [b1, Ch 7]. The operating team inherits the building \u2014 the PMO's lessons-learned discipline (Module 05, Knowledge Hub) ensures the next project starts better.\n\n**7. Sustainability & end-of-life.** Modern DC operators face regulatory and tenant pressure on energy consumption, water usage, renewable energy procurement, and life-cycle carbon impacts [b1, Ch 9-10]. Green building certifications (LEED, BREEAM, BCA Green Mark) and corporate power purchase agreements (CPPAs) are now standard.", "citations": ["b1"]}, {"heading": "What drives DC demand", "body_md": "The DC industry has been reshaped by the commoditisation of IT infrastructure [b1, Ch 4]:\n\n1. **Virtualisation** (2000s) decoupled workloads from physical servers, creating the first wave of DC density growth.\n2. **Software-as-a-Service** (2010s) moved enterprise IT from on-premise server rooms to third-party facilities \u2014 driving colocation growth.\n3. **Hyperscale cloud** (AWS, Azure, GCP \u2014 2010s-present) created a new category: 100MW+ campuses purpose-built for a single tenant, designed for modular scaling.\n4. **Kubernetes and containerisation** (2020s) added another abstraction layer, making workloads portable across DCs and clouds.\n5. **AI/GPU workloads** (2024-present) are driving the next step-change: rack densities moving from 5-10kW to 50kW+, requiring liquid cooling and fundamentally different electrical design.\n\nEach wave created demand for more power, more cooling, and more connectivity \u2014 the three resources a DC developer controls.", "citations": ["b1"]}, {"heading": "Common pitfalls", "body_md": "From the book's guidance on avoiding things going wrong [b1, Ch 10]:\n\n- **Inadequate power planning.** Underestimating the MW growth trajectory \u2014 a 20MW first phase that needs to scale to 100MW+ requires a substation sized for the end-state, not Phase 1.\n- **Late procurement.** Long-lead equipment (transformers, switchgear, generators) ordered after design freeze rather than in parallel with it, adding months to the schedule.\n- **Poor stakeholder alignment.** Investors, operators, and tenants operate on different timelines and success criteria. The PMO's job is to keep all three on the same version of the truth.\n- **Commissioning underinvestment.** Treating commissioning as a final checkbox rather than an integrated phase \u2014 the most common source of energisation-date slippage.\n- **Sustainability compliance gaps.** Regulatory requirements (carbon reporting, water usage, energy efficiency) evolving faster than project timelines \u2014 a compliance risk if not tracked from site selection onward.", "citations": ["b1"]}], "citations": [{"id": "b1", "title": "Data Centre Essentials: Design, Construction, and Operation of Data Centres for the Non-Expert", "publisher": "Wiley (Vincent Fogarty & Sophia Flucker, 2023)", "url": "https://www.wiley.com/en-us/Data+Centre+Essentials-p-9781119898818", "accessed": "2026-07-12"}], "audit": [{"ts": "2026-07-12T12:00:00", "actor": "deep-research", "action": "created from book-sourced research (Data Centre Essentials, Fogarty & Flucker 2023)"}]}, {"id": "kb-pmo-framework", "type": "kb_doc", "title": "PMO Design & Delivery Framework", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-12", "sections": [{"heading": "The PAD3T delivery model", "body_md": "Delivering Successful PMOs [b2] structures PMO creation around the PAD3T framework: **Plan \u2192 Assess \u2192 Design \u2192 Deploy \u2192 Transition \u2192 Transfer.**\n\nThis maps directly to the Zerra PMO operating model shown on the one-pager:\n\n| PAD3T stage | Zerra operating-model equivalent | What happens |\n|---|---|---|\n| Plan | Intake | Tool requests collected, sponsor endorsement secured |\n| Assess | Prioritise | Scored against PMO strategy: strategic fit, customer pull, internal capacity |\n| Design + Deploy | Build | Sprint-style 30-day build cycles; named owner; version-pinned output |\n| Transition | Govern | Reviewed, audited, cited; governance register updated |\n| Transfer | Scale | Rolled out to whole company; PMO keeps shipping without the builder |\n\nThe key insight: a PMO is not a one-time project \u2014 it is a capability that moves through these phases iteratively, maturing with each cycle.", "citations": ["b2"]}, {"heading": "PMO types \u2014 which fits Zerra", "body_md": "The book distinguishes three PMO types [b2, Ch 1-2]:\n\n1. **Supportive PMO.** Provides templates, best practices, training, and light-touch governance. Suitable for early-stage or low-risk environments. Typical where project managers are embedded in business units.\n\n2. **Controlling PMO.** Mandates compliance with standards, enforces governance frameworks, and requires specific deliverables at each gate. Suitable for regulated or high-risk environments where consistency is non-negotiable.\n\n3. **Directive PMO.** Directly manages projects \u2014 the PMO IS the delivery arm, assigning project managers and owning outcomes. Suitable for organisations where all project delivery is centralised.\n\nZerra's described need (under Asvin's brief) sits between controlling and directive: the PMO enforces the gate framework, evidence standards, and cross-project RAID consolidation, while functional leads (Engineering, Procurement, Construction, Commissioning) own the technical deliverables and the authorised executive or investment committee makes the actual gate decision. This split is intentional \u2014 the PMO governs the process, not the technical outcome.", "citations": ["b2"]}, {"heading": "Why PMOs fail \u2014 and how to prevent it", "body_md": "The book identifies five com
