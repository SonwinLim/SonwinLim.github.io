mon PMO failure modes [b2, Ch 3]:\n\n1. **Lack of executive sponsorship.** A PMO without a champion at the leadership level is treated as administrative overhead. The sponsor must be visible, consistent, and willing to enforce the PMO's authority \u2014 Asvin fills this role at Zerra.\n\n2. **Perceived as overhead, not value-add.** If the PMO is seen as the team that asks for status reports rather than the team that makes status reports unnecessary, it has already failed. The Collapser (Module 04) is the counter-argument: portfolio RAID in seconds, not days.\n\n3. **Scope creep.** Trying to do everything at once \u2014 all processes, all tools, all projects on day one. The 90-day plan deliberately sequences: harden flagship first (Johor), then onboard Sales + Marketing lenses, then scale.\n\n4. **Poor change management.** The PMO is resisted rather than adopted because it feels imposed. The counter: every module in this system reads the same governed store, so adopting one lens (e.g. Radar for Marketing) creates pull for others.\n\n5. **No measurable success criteria at setup.** The PMO cannot demonstrate value because its value was never defined. The 6-month success metrics question in the meeting playbook (Q6 for Asvin) is designed to prevent this.", "citations": ["b2"]}], "citations": [{"id": "b2", "title": "Delivering Successful PMOs: How to Design and Deliver the Best Project Management Office for your Business", "publisher": "Routledge (Peter Taylor & Ray Mead, 2015)", "url": "https://www.routledge.com/Delivering-Successful-PMOs/Taylor-Mead/p/book/9781472413796", "accessed": "2026-07-12"}], "audit": [{"ts": "2026-07-12T12:00:00", "actor": "deep-research", "action": "created from book-sourced research (Delivering Successful PMOs, Taylor & Mead 2015)"}]}, {"id": "kb-program-vs-project", "type": "kb_doc", "title": "Program vs. Project Governance", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-12", "sections": [{"heading": "What is a program?", "body_md": "Per The Standard for Program Management, 5th Edition (PMI, 2024) [b3, \u00a71.2]: a program is a set of related projects, subsidiary programs, and program activities managed in a coordinated manner to obtain benefits not available from managing them individually.\n\nZerra's portfolio across Australia, Japan, and India IS a program by this definition: multiple concurrent capital projects at different stage-gates (Site through Operate), sharing resources (engineering design team, procurement function, customer relationships), competing for the same long-lead equipment supply chain, and collectively delivering on the same organisational strategy \u2014 hyperscale DC capacity in APAC.\n\nA project manager asks \"will my project hit its next milestone?\" A program manager or PMO asks \"across all projects, which commitments are at risk, what is causing the risk, where are projects competing for the same resources, and which leadership decision is required now?\" [b3, \u00a71.9].", "citations": ["b3"]}, {"heading": "Five program management performance domains", "body_md": "The Standard defines five performance domains that interact throughout the program life cycle [b3, \u00a73]:\n\n1. **Strategic Alignment.** Does every component project contribute to the organisational strategy? For Zerra: does each campus align with the APAC hyperscale demand thesis, or has a project drifted into a non-core market?\n\n2. **Benefits Management.** Are we tracking benefits delivery (energised MW, customer revenue, capital efficiency), not just milestone completion? The program-level view tracks the portfolio NPV, not individual project schedules.\n\n3. **Stakeholder Engagement.** Are the right people informed and aligned across all projects? In a program, stakeholders span markets \u2014 the customer negotiating a Tokyo lease may not know that the Mumbai transformer order will compete with Tokyo's for the same manufacturing slot.\n\n4. **Governance.** Are decisions made at the right level with the right evidence? The gate framework (Module 05, stage-gate record) defines the evidence standard for each decision; the PMO runs the review but the authorised body makes the call.\n\n5. **Collaboration.** Are component teams sharing resources, data, and risk visibility? This is the structural argument for one governed store: a risk surfaced in one project (e.g. a transformer vendor delay) is automatically visible to every other project that depends on that vendor.", "citations": ["b3"]}, {"heading": "Program life cycle phases", "body_md": "The program life cycle has four phases [b3, \u00a74]:\n\n1. **Program Formulation.** Defining the program vision, identifying components, and securing authorisation. At Zerra: the decision to enter Australia, Japan, and India as three coordinated markets rather than independent bets.\n2. **Program Planning.** Building the program roadmap, benefits realisation plan, and governance structure. At Zerra: the stage-gate framework, the long-lead procurement tracker, and the portfolio RAID consolidation.\n3. **Program Delivery.** Managing component projects, integrating outputs, and transitioning benefits to operations. At Zerra: the day-to-day PMO work of gate reviews, RAID updates, and cross-project coordination.\n4. **Program Closure.** Formal handover of benefits to the sustaining organisation and lessons learned. At Zerra: when a campus transitions from the development PMO to the operations team, every lesson learned feeds back into the Knowledge Hub.", "citations": ["b3"]}], "citations": [{"id": "b3", "title": "The Standard for Program Management, Fifth Edition", "publisher": "Project Management Institute (PMI, 2024)", "url": "https://www.pmi.org/pmbok-guide-standards/foundational/program-management", "accessed": "2026-07-12"}], "audit": [{"ts": "2026-07-12T12:00:00", "actor": "deep-research", "action": "created from book-sourced research (Standard for Program Management, 5th Ed., PMI 2024)"}]}, {"id": "kb-dc-vocabulary", "type": "kb_doc", "title": "DC Terminology Reference", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-12", "sections": [{"heading": "Customer types", "body_md": "- **Hyperscaler.** A cloud company operating at planet scale \u2014 AWS, Microsoft Azure, Google Cloud, Meta. They are Zerra's primary customers and lease entire campuses, not individual racks.\n- **Neocloud / AI-first buyer.** A GPU-as-a-service company like CoreWeave (32 DCs, 250,000 GPUs) or Nebius (Nvidia $2bn investment). Fastest-growing customer segment; different requirements from traditional hyperscalers \u2014 higher rack density, liquid cooling.\n- **Colocation (colo) provider.** A DC operator that rents space to multiple customers \u2014 each owns their own servers, shares the building infrastructure. Equinix is the archetype. Zerra is NOT a colo operator \u2014 it's a hyperscale developer.\n- **Build-to-suit (BTS).** A DC built for one specific customer/tenant to their exact specification. Zerra's commercial model.", "citations": []}, {"heading": "Physical building", "body_md": "- **kW / MW.** DC capacity is measured in delivered IT power, not square footage. A 100MW campus supports 100MW of customer IT load. A single hyperscale rack today draws 10-50kW.\n- **Rack / cabinet.** The standard steel frame holding servers. 42U is standard height. Density is the critical number: '10kW per rack' vs. '50kW per rack' changes the entire cooling design.\n- **White space.** The actual server floor \u2014 revenue-generating square footage. Everything else is 'grey space.'\n- **Meet-Me Room (MMR).** The room where telco carriers and tenants physically cross-connect \u2014 the networking hub of the building.", "citations": []}, {"heading": "Power & cooling", "body_md": "- **PUE (Power Usage Effectiveness).** Total facility power \u00f7 IT equipment power. 1.0 = perfect. 1.2 = excellent. 2.0+ = wasteful. The universal efficiency yardstick.\n- **Redundancy (N+1, 2N).** N+1 = one spare for every N active components. 2N = fully duplicated (no single point of failure).\n- **Transformer.** Steps down utility power for server use. Currently the longest-lead-time item: 160+ weeks in some markets.\n- **UPS.** Battery or flywheel bridge between grid loss and generator start (8-15 seconds).\n- **Liquid cooling / DLC.** Direct-to-chip or immersion cooling for high-density AI racks (>50kW). The biggest infrastructure shift happening in 2026.\n- **CRAC / CRAH / Chiller.** Computer room air conditioner (refrigerant-based), air handler (chilled water-based), and the central chiller plant.", "citations": []}, {"heading": "Network & connectivity", "body_md": "- **Interconnect / cross-connect.** A physical cable connecting two networks inside the same DC \u2014 bypasses the public internet for lower latency and higher security.\n- **Subsea cable / landing station.** Fibre-optic cables running across ocean floors. Mumbai is India's primary subsea landing point; Singapore is SE Asia's hub.\n- **Latency.** Round-trip signal time, measured in milliseconds. Sub-millisecond within a metro; ~70ms Singapore\u2192Tokyo. AI inference is latency-sensitive; training is bandwidth-sensitive.\n- **Carrier-neutral DC.** A facility where multiple telcos and ISPs are present, giving tenants choice.", "citations": []}, {"heading": "Design & operations", "body_md": "- **DCIM / BMS.** Data Center Infrastructure Management (software monitoring power/cooling/capacity) and Building Management System (physical controls \u2014 HVAC, fire, security).\n- **SLA.** Contractual uptime/capacity commitment with penalties. A hyperscale DC SLA may commit to 99.999% uptime.\n- **Tier I-IV (Uptime Institute).** Tier I (99.671%) through Tier IV (99.995%). Hyperscale campuses (>100MW) typically don't tier-certify \u2014 they use an owner-specified design basis.\n- **Commissioning.** Systematic inspection, start-up, and testing of every system before handover. Gate 6 of 7 in Zerra's lifecycle.\n- **Energisation.** The moment permanent utility power reaches the site. The single most important milestone on any DC project schedule.", "citations": []}], "citations": [{"id": "b4", "title": "DC vocabulary compiled from Equinix 'How to Speak Like a Data Center Geek', Data Center Handbook (Geng, 2nd Ed.), Data Centre Essentials (Fogarty & Flucker 2023)", "publisher": "Zerra PMO (compiled)", "url": "https://zerradc.com", "accessed": "2026-07-12"}], "audit": [{"ts": "2026-07-12T12:00:00", "actor": "deep-research", "action": "created from DC vocabulary primer (sourced from Equinix, Data Center Handbook, Data Centre Essentials)"}]}, {"id": "kb-pmbok-initiating", "type": "kb_doc", "title": "PMBOK 7 \u2014 Initiating process group", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "What it is", "body_md": "The **Initiating Process Group** is the first of the five PMBOK process groups; it defines and authorises the project or a new phase. The PMBOK 7th edition (recognised as **ANSI/PMI 99-001-2021**) reframes the process groups around **12 principles of project management** and **8 performance domains** rather than the 5-process-group + 10-knowledge-area schema of the 6th edition [c1][c2].", "citations": ["c1", "c2"]}, {"heading": "Key PMBOK 7 principles applied to Initiating", "body_md": "Three principles drive the Initiating phase for a hyperscale DC site project:\n\n1. **Be a diligent, respectful, and caring steward** [c1]. Land-close partnerships with state authorities and incumbent communities require a long-horizon stewardship posture; this principle operationalises the ethics-of-place question.\n2. **Effectively engage with stakeholders** [c1]. Engaging stakeholders (landowners, the TNB-equivalent utility, the local community, the eventual customer) early and continuously through a documented stakeholder-engagement plan.\n3. **Focus on value** [c1]. The Initiating deliverables are the business case, the project charter, the benefits management plan and the stakeholder register \u2014 every one of them should be defensible against the value they create for the customer's AI-infrastructure launch timeline.\n\nIn PMBOK 7's **8 performance domains**, Initiating overlaps primarily with the **Stakeholder** and **Planning** performance domains \u2014 Stakeholder performance domain (identify, engage, manage expectations) is the Initiating-phase pivot for a hyperscale DC.", "citations": ["c1"]}, {"heading": "Initiating deliverables for a hyperscale DC project", "body_md": "- **Project charter** \u2014 sponsors, mandate, business case, key constraints, listed risks (transformer / genset / chiller lead time, grid queue position, sovereign-AI jurisdiction).\n- **Stakeholder register** \u2014 utility, sub-station operator, state/federal authorities, landowners, eventual hyperscaler customer, EPC partners.\n- **Business case** \u2014 full-life-cycle DC economics; land, build, energise, operate, exit-vs-hold.\n- **Benefits management plan** \u2014 when does the campus start earning against the build-out capex?\n- **Initial risk register** \u2014 long-lead procurement is the dominant risk class.", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "PMBOK Guide \u2014 Seventh Edition (2021); ANSI/PMI 99-001-2021; 12 principles; 8 performance domains", "publisher": "Wikipedia (Project Management Institute)", "url": "https://en.wikipedia.org/wiki/Project_Management_Institute", "accessed": "2026-07-04"}, {"id": "c2", "title": "PMBOK Guide \u2014 overview and process-group history", "publisher": "Wikipedia (PMBOK Guide)", "url": "https://en.wikipedia.org/wiki/PMBOK_Guide", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T14:30:00", "actor": "deep-research", "action": "created from PMBOK 7 distillation"}]}, {"id": "kb-pmbok-planning", "type": "kb_doc", "title": "PMBOK 7 \u2014 Planning performance domain", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "What it is", "body_md": "The **Planning Performance Domain** (PMBOK 7) addresses the activities and functions associated with establishing the total scope of effort, defining and refining objectives, and developing the actions required to achieve those objectives [c1].", "citations": ["c1"]}, {"heading": "Why it matters in a hyperscale DC", "body_md": "Planning is where the **24\u201348 month from land close to energisation** timeline is decomposed into the deliverables of the rest of the project. The Planning deliverables \u2014 the project management plan, scope baseline, schedule baseline, cost baseline, risk management plan, issue log \u2014 are the artefacts the PMO will manage-to for the next two-plus years.\n\nIn a hyperscale DC, the planning artefacts that are most-bid-specific:\n- **Long-lead procurement plan** \u2014 transformer + generator + chiller + switchgear; 18\u201336 month lead times across all of these; the planning schedule must propagate lead-time risk through the build sequence.\n- **Grid-application schedule** \u2014 the utility interconnection application often has a 12\u201324 month approval window and can drive the entire energisation date.\n- **Stage-gate plan** \u2014 site \u2192 feasibility \u2192 design \u2192 procure \u2192 build \u2192 commission \u2192 operate gates, with documented entry/exit criteria at each gate.", "citations": ["c1"]}, {"heading": "Methods & outputs", "body_md": "Common methods: rolling-wave planning, decomposition (WBS), progressive elaboration. Output: a living project-management plan that the PMO updates quarterly with variance-to-baseline and replan decisions traced back to specific decisions in the build sequence.", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "PMBOK Guide \u2014 Seventh Edition (2021); Planning performance domain; 12 principles", "publisher": "Wikipedia (Project Management Institute)", "url": "https://en.wikipedia.org/wiki/Project_Management_Institute", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T14:35:00", "actor": "deep-research", "action": "created from PMBOK 7 distillation"}]}, {"id": "kb-pmbok-executing", "type": "kb_doc", "title": "PMBOK 7 \u2014 Executing / Delivery performance domain", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "What it is", "body_md": "The **Delivery Performance Domain** (PMBOK 7) covers activities and functions related to delivering the project scope and the work defined to achieve it [c1]. This is where the project's actual deliverables \u2014 site, design, build, energisation, handover \u2014 are produced.", "citations": ["c1"]}, {"heading": "Why it matters in a hyperscale DC", "body_md": "Executing/Delivery in a hyperscale DC is dominated by:\n\n1. **Long-lead procurement execution.** Once the procurement plan locks in transformer / genset / chiller / switchgear vendors, the team's ability to track commitments through the 18\u201336-month build is the largest operational challenge. Vendor-managed inventory, milestone-based payments and QA on receipt are the delivery-team operating disciplines.\n2. **Design management across disciplines.** Civil / structural / architectural / mechanical (cooling) / electrical (MV/LV, UPS, generators) / telco \u2014 each has a separate design firm. The PMO's job is to keep the design integration at the campus level, not at the discipline level. **Hit-and-fix** is the most common delivery failure mode in DC development.\n3. **Construction management.** GC / multiple-prime relationships; ground-breaking, substation commissioning, energisation, integrity test, performance test, customer-fit-out \u2014 12+ sub-milestones sequenced over 18\u201324 months.\n4. **Stakeholder engagement (Operating Principle 2 in PMBOK 7: Effectively engage with stakeholders)** [c1] \u2014 utility, regulator, customer, community. The Engagement Plan is a living document through Delivery.\n5. **Quality and procurement integration.** Quality is delivered through vendor-managed QA plus independent commissioning. **The Collapser module in this system** (Module 4) is the engine for daily RAID consolidation across the executing-phase projects.", "citations": ["c1"]}, {"heading": "Skills and deliverables", "body_md": "Delivery requires integrated project-management skills: leadership, communication, negotiation, problem-solving, decision-making, political and cultural awareness. Outputs: deliverable acceptance records, project management plan updates, change requests, change log updates, issue logs, RAID updates \u2014 all machine-readable for the Workflow layer (Module 4).", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "PMBOK Guide \u2014 Seventh Edition (2021); Delivery performance domain; 12 principles (incl. effectively engage with stakeholders)", "publisher": "Wikipedia (Project Management Institute)", "url": "https://en.wikipedia.org/wiki/Project_Management_Institute", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T14:40:00", "actor": "deep-research", "action": "created from PMBOK 7 distillation"}]}, {"id": "kb-pmbok-monitoring", "type": "kb_doc", "title": "PMBOK 7 \u2014 Monitoring / Uncertainty, Risk & Opportunity performance domain", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "What it is", "body_md": "Two PMBOK 7 performance domains address the monitoring function:\n\n- **Measurement Performance Domain** \u2014 assesses project performance and makes recommendations for corrective action to maintain performance [c1].\n- **Uncertainty Performance Domain** \u2014 addresses risk, ambiguity and complexity on the project [c1].\n\nThe 6th-edition **Monitoring & Controlling Process Group** has been re-distributed across these two performance domains in the 7th edition.", "citations": ["c1"]}, {"heading": "Why it matters in a hyperscale DC", "body_md": "Monitoring in a hyperscale DC is the **portfolio-level** question \u2014 separate from the per-project measurement function. The PMO's role here is the cross-project variance roll-up, RAID roll-up, milestone-confidence roll-up, and the early-warning signals. This is **literally what the Workflow Collapser module (Module 04) does** \u2014 it consolidates RAID across multiple projects into a single portfolio view, in seconds. In PMBOK 7 language, the Collapser is the Measurement Domain's automated-roll-up tool.", "citations": ["c1"]}, {"heading": "Tools and methods", "body_md": "Earned Value Management (EVM) for cost-schedule integration; Monte Carlo for risk modelling (a 24\u201348 month timeline has long-tail risk exposure); RAID registers with severity-weighted scoring; milestone-confidence tracking (high / medium / low confidence); variance-to-baseline reporting with replan-trace decisions. The **Collapser module** of this system demonstrates EVM-style portfolio roll-up in real time.", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "PMBOK Guide \u2014 Seventh Edition (2021); Measurement Performance Domain; Uncertainty Performance Domain; 12 principles", "publisher": "Wikipedia (Project Management Institute)", "url": "https://en.wikipedia.org/wiki/Project_Management_Institute", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T14:45:00", "actor": "deep-research", "action": "created from PMBOK 7 distillation"}]}, {"id": "kb-pmbok-closing", "type": "kb_doc", "title": "PMBOK 7 \u2014 Closing / Lifecycle performance domain", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "What it is", "body_md": "The **Team** and **Lifecycle** Performance Domains (PMBOK 7) bring the project to closure. The Lifecycle Domain covers all activities and functions from project initiation through to closure [c1].\n\nIn the 6th-edition vocabulary, the **Closing Process Group** formally closes the project or phase, including contract closure, final product/service acceptance, lessons learned and the administrative close.", "citations": ["c1"]}, {"heading": "Why it matters in a hyperscale DC", "body_md": "DC 'close' is two-stage: **commercial close-out** (final customer acceptance / energisation certificate / final payments) and **operating handover** (move the asset to the O&M team). The PMO's discipline at close is to make sure the lessons-learned catalogue is populated \u2014 what worked, what didn't, what to add to the stage-gate playbook for the next project.\n\n**Key Operating Principle 4 of PMBOK 7: Learn, adapt, and stay relevant** [c1] is the closing-phase discipline applied to the whole PMO \u2014 every project closes feeds back to the stage-gate playbook so the next project starts better.", "citations": ["c1"]}, {"heading": "Outputs", "body_md": "- **Final product/service transition** \u2014 the campus moves from construction to operating.\n- **Lessons-learned repository** \u2014 into the PMO knowledge base (Module 5 / Knowledge Hub of this system).\n- **Final report** \u2014 benefits realisation against the original charter.\n- **Closure records** \u2014 contract closeouts, vendor final payments, insurance tail.", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "PMBOK Guide \u2014 Seventh Edition (2021); Team and Lifecycle Performance Domains; 12 principles (incl. learn, adapt, and stay relevant)", "publisher": "Wikipedia (Project Management Institute)", "url": "https://en.wikipedia.org/wiki/Project_Management_Institute", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T14:50:00", "actor": "deep-research", "action": "created from PMBOK 7 distillation"}]}, {"id": "kb-zerra-stage-gates", "type": "kb_doc", "title": "Zerra DC \u2014 Hyperscale campus stage-gate lifecycle", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "restricted", "updated": "2026-07-04", "sections": [{"heading": "Why this is restricted", "body_md": "This document records Zerra's internal stage-gate process and project economics. Access is restricted to PMO and Tier-1 leadership; viewing logs are written to the governance audit trail.", "citations": ["c1"]}, {"heading": "The seven-gate lifecycle", "body_md": "Zerra's hyperscale DC capital-project lifecycle, modelled on AirTrunk-class delivery norms [c2][c3]:\n\n1. **Site identification gate** \u2014 land-options identified, utility reach assessed, sub-zone decided, customer-fit hypothesised.\n2. **Feasibility gate** \u2014 site control (option / close), grid application filed, customer non-binding heads-of-terms, capex envelope \u00b115%.\n3. **Design gate** \u2014 schematic design, transformer / genset / chiller / switchgear long-lead procurement initiated, building permits filed.\n4. **Procurement gate** \u2014 main works contract awarded, long-lead procurement released, financing (potentially project-finance) term-sheet signed.\n5. **Build gate** \u2014 commencement notice, ground-breaking, foundation works.\n6. **Commissioning gate** \u2014 energisation, factory acceptance tests, integrity test, performance test.\n7. **Operate gate** \u2014 handover to operations, customer-fit-out, base-build ready for load.", "citations": ["c2", "c3"]}, {"heading": "Critical-path risks", "body_md": "Across the seven gates, the binding risks are: grid interconnection approval (gates 2\u20134), long-lead procurement (gates 3\u20135), and customer-offtake certainty (gate 1 \u2192 gate 4). The Japanese hyperscale pipeline (AirTrunk's JP\u00a5191.6bn green loan for TOK1 March 2026) demonstrates the project-finance scale required to execute this lifecycle in tier-1 markets [c2].", "citations": ["c2"]}, {"heading": "Across the operating model", "body_md": "Each gate has a documented entry/exit criterion (the 'gate condition'), an owner, and a stage-gate review meeting that the **PMO runs**. This stage-gate playbook is itself a governed, versioned record in this knowledge store.", "citations": ["c3"]}], "citations": [{"id": "c1", "title": "PMBOK Guide \u2014 Stage-gate frameworks and lifecycle performance domain", "publisher": "Wikipedia (Project Management Institute)", "url": "https://en.wikipedia.org/wiki/Project_Management_Institute", "accessed": "2026-07-04"}, {"id": "c2", "title": "AirTrunk \u2014 JP\u00a5191.6bn TOK1 green loan March 2026; largest single Japan DC financing; four Japan campuses", "publisher": "Wikipedia", "url": "https://en.wikipedia.org/wiki/AirTrunk", "accessed": "2026-07-04"}, {"id": "c3", "title": "Zerra DC \u2014 Zerra OS-leadership experience AirTrunk / AWS / Microsoft / Sembcorp-grade programme delivery", "publisher": "Zerra DC", "url": "https://www.zerradc.com", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T15:00:00", "actor": "deep-research", "action": "created from PMBOK and AirTrunk industry references"}]}, {"id": "workflow-raid-consolidation", "type": "workflow", "title": "Workflow \u2014 RAID consolidation across project portfolio", "owner": "PMO \u2014 Ray Lim", "version": "1.0", "access": "internal", "updated": "2026-07-04", "sections": [{"heading": "Before \u2014 what manual consolidation looks like", "body_md": "Before this workflow was built, the PMO's senior analyst would:\n\n1. **Collect weekly status reports** from each project manager (6 projects \u00d7 8\u201315 pages each = 60\u201390 pages of project narrative).\n2. **Extract risk / assumption / issue / dependency (RAID) items** from each narrative into a spreadsheet manually.\n3. **Classify severity** (high / medium / low).\n4. **Sort, deduplicate, and tag** by project and owner.\n5. **Build the portfolio RAID** that the leadership team reviews in their Monday standing meeting.\n\nThat process took **2\u20133 days of analyst time per week** for a 6-project portfolio. The delay meant the leadership meeting was looking at week-old data, and the PMs were doing duplicate-update work on both their own status reports and the consolidated view.", "citations": ["c1", "c2"]}, {"heading": "After \u2014 the Workflow Collapser", "body_md": "Module 04 of this system \u2014 the **Workflow Collapser** \u2014 does the same consolidation in milliseconds. The inputs are machine-readable JSON project-status files (`mock/project-status/proj-XX.json`); the output is a merged, severity-sorted portfolio RAID plus a milestone-risk list.\n\nThe **operating model** this enables: project managers own their data in structured form at source, the workflow layer does the cross-project synthesis, and the leadership team reviews live portfolio state in their Monday meeting. Net effect: **days-to-minutes, every week**, with the time dividend going back into PM-level decision-making rather than data entry.\n\nThis is **the same pattern Asvin used to compress a multi-day workflow into minutes** in his prior role, generalised into a reusable PMO building block.", "citations": ["c1"]}, {"heading": "How to extend it", "body_md": "New workflows plug into the same pattern: a **structured input**, a **deterministic transform**, and a **stakeholder-facing output**. As examples for future extension:\n\n- **Tender comparison collapse** \u2014 vendor-quote spreadsheets \u2192 side-by-side apples-to-apples comparison.\n- **Executive summary roll-up** \u2014 6 project narrative reports \u2192 1 page of executive bullets.\n- **Stakeholder update digest** \u2014 multiple project status feeds \u2192 single weekly stakeholder email.\n\nThe Collapser is therefore not a one-off script; it is the **first instantiation of a reusable workflow pattern** that the PMO operating model scales from one team to many.", "citations": ["c1"]}], "citations": [{"id": "c1", "title": "PMBOK Guide \u2014 Delivery and Measurement Performance Domains; 12 principles incl. focus on value and learn, adapt, stay relevant", "publisher": "Wikipedia (Project Management Institute)", "url": "https://en.wikipedia.org/wiki/Project_Management_Institute", "accessed": "2026-07-04"}, {"id": "c2", "title": "Zerra DC \u2014 leadership experience covers AirTrunk / Yondr-style hyperscale delivery and days-to-minutes wins", "publisher": "Zerra DC", "url": "https://www.zerradc.com", "accessed": "2026-07-04"}], "audit": [{"ts": "2026-07-04T15:30:00", "actor": "deep-research", "action": "created from PMBOK + Zerra dossier references"}]}]};</script>

due": "2026-08-15"}], "milestones": [{"name": "Planning permit issued", "due": "2026-09-30", "confidence": "medium"}, {"name": "Stage-gate 1 (site ID) to 2 (feasibility)", "due": "2026-08-30", "confidence": "medium"}]}, {"project": "JHB-01 long-lead procurement", "pm": "B. Boudreau", "week": "2026-W27", "status": "red", "raid": [{"kind": "risk", "text": "MV transformer factory capacity booked through Q2 2027 across all major vendors", "severity": "high", "owner": "B. Boudreau", "due": "2026-12-31"}, {"kind": "issue", "text": "Chiller vendor factory-acceptance test schedule pushed by 6 weeks", "severity": "high", "owner": "B. Boudreau", "due": "2026-08-15"}, {"kind": "risk", "text": "Custom-switchgear vendor requires 30% deposit upfront; cash-flow planning needed", "severity": "medium", "owner": "J. Jackman", "due": "2026-07-15"}, {"kind": "dependency", "text": "TNB load-approval letter required before transformer PO can be released", "severity": "high", "owner": "M. Magele", "due": "2026-07-30"}], "milestones": [{"name": "Transformer PO release", "due": "2026-08-15", "confidence": "low"}, {"name": "Stage-gate 4 (procurement)", "due": "2026-09-30", "confidence": "medium"}]}];</script>

<script>"use strict";
const $ = (s, el = document) => el.querySelector(s);
const R = id => window.STORE.records.find(r => r.id === id);
const byType = t => window.STORE.records.filter(r => r.type === t);
const SESSION_AUDIT = [];
const logAudit = (recordId, action) => SESSION_AUDIT.push(
  { ts: new Date().toISOString(), actor: "demo-user", recordId, action });

const esc = s => s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function md(src) {                       // minimal markdown: ##/###, **, bullets, [cN]
  return src.split(/\n{2,}/).map(block => {
    let b = esc(block.trim());
    if (b.startsWith("### ")) return `<h4>${b.slice(4)}</h4>`;
    if (b.startsWith("## "))  return `<h3>${b.slice(3)}</h3>`;
    b = b.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
         .replace(/\[(c\d+)\]/g, '<sup class="cite"><a href="#src-$1">[$1]</a></sup>');
    if (/^- /m.test(b)) {              // only "- " lines become <li>; intro lines stay <p>
      let out = "", list = [];
      const flush = () => { if (list.length) {
        out += "<ul><li>" + list.join("</li><li>") + "</li></ul>"; list = []; } };
      for (const l of b.split(/\n/))
        if (l.startsWith("- ")) list.push(l.slice(2)); else { flush(); out += `<p>${l}</p>`; }
      flush(); return out;
    }
    return `<p>${b.replace(/\n/g, "<br>")}</p>`;
  }).join("");
}
const govBadge = r => `<div class="small" style="margin:6px 0 10px">
  <span class="badge">owner ${esc(r.owner)}</span><span class="badge">v${esc(r.version)}</span>
  <span class="badge ${r.access}">${esc(r.access)}</span>
  <span class="badge">updated ${esc(r.updated)}</span></div>`;
const citeList = r => `<h3>Sources</h3><ol class="small">` + r.citations.map(c =>
  `<li id="src-${c.id}">${esc(c.title)} - ${esc(c.publisher)} - ` +
  `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.url)}</a> (accessed ${esc(c.accessed)})</li>`
  ).join("") + "</ol>";
const scoreBar = n => `<span class="score">` +
  [1,2,3,4,5].map(i => `<i class="${i <= n ? "on" : ""}"></i>`).join("") + "</span>";
const sections = r => r.sections.map(s => `<h3>${esc(s.heading)}</h3>${md(s.body_md)}`).join("");
const recordPage = r => { logAudit(r.id, "viewed");
  return `<div class="card"><h2>${esc(r.title)}</h2>${govBadge(r)}${sections(r)}${citeList(r)}</div>`; };

const VIEWS = {};
VIEWS.home = { title: "System", render(el) {
  el.innerHTML = `<div class="card" id="home-kpi"><h2>One system, five layers</h2>
    <p>Every module below reads the <strong>same governed knowledge store</strong>:
    ${window.STORE.records.length} records, every one cited, owned and versioned.
    Add intelligence once - every lens benefits.</p></div>
    <div class="grid">` + [
      ["sites","01 · Site & Market Screening","Region in → cited go/no-go screening brief out."],
      ["sales","02 · Sales Intelligence","Hyperscaler & neocloud demand signals → pitch angles."],
      ["radar","03 · Market & Competitor Radar","AirTrunk / NextDC / Nxera moves, dated and cited."],
      ["collapse","04 · Workflow Collapser","Six project reports → one portfolio RAID, in seconds."],
      ["hub","05 · PMO Knowledge Hub","Governed, searchable PMBOK + process knowledge."],
      ["live","06 Live","Type a query → live research → cited brief added to the store."],
      ["governance","Governance","Ownership, versions, access tiers, audit trail - built in."],
    ].map(([k,t,d]) => `<a class="card" style="display:block;text-decoration:none"
      href="#/${k}"><h2>${t}</h2><p class="dim">${d}</p></a>`).join("") + "</div>"; } };

VIEWS.sites = { title: "01 Sites", render(el, id) {
  const briefs = byType("region_brief");
  if (id) { const r = R(id);
    if (!r) { el.innerHTML = '<p class="dim">Record not found.</p>'; return; }
    logAudit(r.id, "viewed");
    el.innerHTML = `<p class="small"><a href="#/sites">← all regions</a></p>
      <div class="card"><h2>${esc(r.title)}</h2>${govBadge(r)}
      <h3>Screening scorecard</h3><table>` +
      r.scorecard.map(s => `<tr><td style="width:200px">${esc(s.dimension)}</td>
        <td style="width:140px">${scoreBar(s.rating)}</td>
        <td class="small">${md(s.summary)}</td></tr>`).join("") +
      `</table>${sections(r)}${citeList(r)}</div>`; return; }
  el.innerHTML = `<div class="card"><h2>Greenfield Site & Market Screening</h2>
    <p class="dim">Region in → cited screening brief out: power, land, connectivity,
    regulation, sustainability, demand. Same engine as modules 02–03, site lens.</p></div>
    <div class="grid">` + briefs.map(r => {
      const avg = (r.scorecard.reduce((a, s) => a + s.rating, 0) / r.scorecard.length).toFixed(1);
      return `<a class="card" style="display:block;text-decoration:none" href="#/sites/${r.id}">
        <h2>${esc(r.title)}</h2><div class="kpi">${avg}<span class="small dim">/5</span></div>
        ${govBadge(r)}<p class="dim small">${r.citations.length} cited sources</p></a>`;
    }).join("") + "</div>"; } };

VIEWS.sales = { title: "02 Sales", render(el, id) {
  if (id) { const r = R(id);
    if (!r) { el.innerHTML = '<p class="dim">Record not found.</p>'; return; }
    logAudit(r.id, "viewed");
    el.innerHTML = `<p class="small"><a href="#/sales">← all targets</a></p>
      <div class="card"><h2>${esc(r.title)}</h2>${govBadge(r)}
      <h3>Expansion signals</h3><table>` +
      (r.signals || []).map(s => `<tr><td style="width:90px;font-family:var(--mono)">${esc(s.date)}</td>
        <td>${md(s.text)}</td></tr>`).join("") +
      `</table>${sections(r)}${citeList(r)}</div>`; return; }
  el.innerHTML = `<div class="card"><h2>Hyperscaler / Neocloud Sales Intelligence</h2>
    <p class="dim">Target in → capacity posture, dated expansion signals, pitch angles.
    Same engine, customer lens.</p></div><div class="grid">` +
    byType("customer_brief").map(r => `<a class="card" style="display:block;text-decoration:none"
      href="#/sales/${r.id}"><h2>${esc(r.title)}</h2>${govBadge(r)}
      <p class="dim small">${(r.signals || []).length} dated signals ·
      ${r.citations.length} sources</p></a>`).join("") + "</div>"; } };

VIEWS.radar = { title: "03 Radar", render(el, id) {
  if (id) { const r = R(id);
    if (!r) { el.innerHTML = '<p class="dim">Record not found.</p>'; return; }
    logAudit(r.id, "viewed");
    el.innerHTML = `<p class="small"><a href="#/radar">← radar</a></p>
      <div class="card"><h2>${esc(r.title)}</h2>${govBadge(r)}
      <h3>Recent moves</h3><table>` +
      (r.moves || []).map(m => `<tr><td style="width:90px;font-family:var(--mono)">${esc(m.date)}</td>
        <td><strong>${esc(m.headline)}</strong><br><span class="dim small">${md(m.why)}</span></td></tr>`).join("") +
      `</table>${sections(r)}${citeList(r)}</div>`; return; }
  const all = byType("competitor_brief")
    .flatMap(r => (r.moves || []).map(m => ({ ...m, who: r.title, id: r.id })))
    .sort((a, b) => b.date.localeCompare(a.date)).slice(0, 10);
  el.innerHTML = `<div class="card"><h2>Market & Competitor Radar</h2>
    <p class="dim">Cross-competitor timeline, newest first. Same engine, market lens.</p>
    <table><tr><th>when</th><th>who</th><th>move</th></tr>` +
    all.map(m => `<tr><td style="font-family:var(--mono)">${esc(m.date)}</td>
      <td><a href="#/radar/${m.id}">${esc(m.who)}</a></td><td>${esc(m.headline)}</td></tr>`).join("") +
    `</table></div><div class="grid">` +
    byType("competitor_brief").map(r => `<a class="card" style="display:block;text-decoration:none"
      href="#/radar/${r.id}"><h2>${esc(r.title)}</h2>${govBadge(r)}</a>`).join("") + "</div>"; } };

VIEWS.collapse = { title: "04 Collapse", render(el) {
  const wf = R("workflow-raid-consolidation");
  el.innerHTML = `<div class="card"><h2>Workflow Collapser - portfolio RAID consolidation</h2>
    ${govBadge(wf)}<p class="dim">Before: PMO analyst manually merges ${window.MOCK_STATUS.length}
    weekly project reports over days. After: the workflow layer does it below -
    <strong>watch the clock</strong>. New workflows plug into the same pattern.</p>
    <p class="small dim">Inputs are representative mock projects (no client data).</p>
    <div id="collapse-run"><p style="margin-top:12px"><button class="run" id="go">Run consolidation
    (${window.MOCK_STATUS.length} reports)</button></p><div id="out"></div>
    ${sections(wf)}${citeList(wf)}</div>`;
  $("#go").onclick = () => {
    const t0 = performance.now();
    const sev = { high: 0, medium: 1, low: 2 };
    const raid = window.MOCK_STATUS.flatMap(p => p.raid.map(x => ({ ...x, project: p.project })))
      .sort((a, b) => sev[a.severity] - sev[b.severity]);
    const counts = { green: 0, amber: 0, red: 0 };
    window.MOCK_STATUS.forEach(p => counts[p.status]++);
    const slipping = window.MOCK_STATUS.flatMap(p => p.milestones
      .filter(m => m.confidence !== "high").map(m => ({ ...m, project: p.project })));
    const ms = (performance.now() - t0).toFixed(1);
    logAudit("workflow-raid-consolidation", `ran consolidation (${ms} ms)`);
    $("#out").innerHTML = `<h3>Portfolio status - generated in
      <span class="kpi" style="font-size:20px">${ms} ms</span></h3>
      <p><span class="badge" style="color:var(--green)">green ${counts.green}</span>
      <span class="badge" style="color:var(--amber)">amber ${counts.amber}</span>
      <span class="badge" style="color:var(--red)">red ${counts.red}</span></p>
      <h3>Consolidated RAID (${raid.length} items, by severity)</h3>
      <table><tr><th>sev</th><th>type</th><th>project</th><th>item</th><th>owner</th><th>due</th></tr>` +
      raid.map(x => `<tr><td class="sev-${x.severity}">${esc(x.severity)}</td>
        <td>${esc(x.kind)}</td><td style="font-family:var(--mono)">${esc(x.project)}</td>
        <td>${esc(x.text)}</td><td>${esc(x.owner)}</td><td>${esc(x.due)}</td></tr>`).join("") +
      `</table><h3>Milestones at risk</h3><table>` +
      slipping.map(m => `<tr><td style="font-family:var(--mono)">${esc(m.project)}</td>
        <td>${esc(m.name)}</td><td>${esc(m.due)}</td>
        <td class="sev-${m.confidence === "low" ? "high" : "medium"}">${esc(m.confidence)} confidence</td></tr>`).join("") +
      "</table>";
  }; } };

VIEWS.hub = { title: "05 Hub", render(el, id) {
  if (id) { const r = R(id);
    if (!r) { el.innerHTML = '<p class="dim">Record not found.</p>'; return; }
    if (r.access === "restricted") { logAudit(r.id, "ACCESS DENIED (restricted)");
      el.innerHTML = `<p class="small"><a href="#/hub">← hub</a></p>
        <div class="card"><h2>${esc(r.title)}</h2>${govBadge(r)}
        <p class="sev-medium">🔒 Restricted record. Access requires PMO approval -
        request is logged in the governance audit trail.</p></div>`; return; }
    el.innerHTML = `<p class="small"><a href="#/hub">← hub</a></p>` + recordPage(r); return; }
  el.innerHTML = `<div class="card"><h2>PMO Knowledge Hub</h2>
    <p class="dim">One governed, searchable knowledge base: PMBOK practice summaries,
    delivery process, and every intelligence brief in the system. Search everything -
    access tiers and audit apply automatically.</p>
    <div id="hub-search"><input type="search" id="q" placeholder="try: stakeholder · stage gate · power · risk"
      autocomplete="off"><div id="res" style="margin-top:14px"></div></div>`;
  const rank = q => window.STORE.records.map(r => {
    // restricted records ARE discoverable (title + relevance rank only - the result card never
    // shows body text); their bodies are masked at render in the detail view. Discoverability
    // with enforcement at point of use is the governed-search story.
    const hay = (r.title + " " + r.sections.map(s => s.heading + " " + s.body_md).join(" ")).toLowerCase();
    const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
    const hits = terms.reduce((n, t) => n + (hay.split(t).length - 1), 0);
    return { r, hits };
  }).filter(x => x.hits > 0).sort((a, b) => b.hits - a.hits).slice(0, 8);
  $("#q").oninput = e => {
    const q = e.target.value.trim();
    if (q.length < 2) { $("#res").innerHTML = ""; return; }
    logAudit("hub", `searched "${q}"`);
    $("#res").innerHTML = rank(q).map(({ r, hits }) =>
      `<a class="card" style="display:block;text-decoration:none" href="#/hub/${r.id}">
       <h2>${esc(r.title)} ${r.access === "restricted" ? "🔒" : ""}</h2>
       ${govBadge(r)}<p class="dim small">${hits} matches · ${esc(r.type)} ·
       ${r.citations.length} sources</p></a>`).join("") ||
      `<p class="dim">no matches</p>`;
  }; } };

VIEWS.live = { title: "06 Live", render(el) {
  el.innerHTML = `<div class="card"><h2>Live Query</h2>
    <p class="dim">Type a query - Wikipedia research runs directly in your browser.
    No backend needed. Works on raylim.me.</p>
    <div style="display:flex;gap:8px;margin:10px 0">
      <input type="search" id="live-q" placeholder="e.g. Hyderabad India · AWS Sydney · Equinix"
        style="flex:2" autocomplete="off">
      <select id="live-type" style="padding:10px;border-radius:6px;border:1px solid var(--line);
        background:var(--panel-2);color:var(--text);font:14px var(--sans)">
        <option value="region_brief">Region brief</option>
        <option value="customer_brief">Customer brief</option>
        <option value="competitor_brief">Competitor brief</option>
      </select>
      <button class="run" id="live-go">Generate</button></div>
    <div id="live-out"></div></div>`;
  const show = (html) => { $("#live-out").innerHTML = html; };
  $("#live-go").onclick = async () => {
    const q = $("#live-q").value.trim(), t = $("#live-type").value;
    if (!q) { show('<p class="dim">Enter a query.</p>'); return; }
    show('<p class="dim">Searching Wikipedia…</p>');
    try {
      const api = "https://en.wikipedia.org/w/api.php?origin=*&format=json";
      const searchUrl = api + "&action=query&generator=search&gsrsearch=" + encodeURIComponent(q) + "&gsrlimit=3&prop=extracts&exintro&explaintext";
      const sr = await fetch(searchUrl).then(r => r.json());
      const pd = (sr.query && sr.query.pages) || {};
      const pages = Object.values(pd);
      if (!pages.length) { show('<p class="dim">No results. Try a more specific query.</p>'); return; }
      const today = new Date().toISOString().slice(0,10);
      const slug = "live-" + q.toLowerCase().replace(/[^a-z0-9]+/g,"-").slice(0,30);
      const record = { id: slug, type: t, title: "Live: " + q, owner: "PMO - live query",
        version: "0.1-draft", access: "internal", updated: today, sections: [], citations: [],
        audit: [{ ts: new Date().toISOString(), actor: "live-query", action: "generated from: " + q }] };
      if (t === "region_brief") record.scorecard = [];
      if (t === "customer_brief") record.signals = [];
      if (t === "competitor_brief") record.moves = [];
      pages.slice(0,3).forEach(function(p, i) {
        var cid = "live-c" + (i+1);
        var title = p.title;
        record.citations.push({ id: cid, title: title, publisher: "Wikipedia",
          url: "https://en.wikipedia.org/wiki/" + encodeURIComponent(title.replace(/ /g,"_")),
          accessed: today });
        record.sections.push({ heading: title, body_md: (p.extract || "") + " [" + cid + "]",
          citations: [cid] });
      });
      if (t === "region_brief") record.scorecard.push({ dimension: "Rapid screen",
        rating: 3, summary: "Live-generated - verify before production use. " + q + " [live-c1]",
        citations: ["live-c1"] });
      window.STORE.records.push(record);
      logAudit(record.id, "live query generated");
      show(`<div class="card" style="background:var(--bg)">
        <h2>✓ Generated: ${esc(record.title)}</h2>
        ${govBadge(record)}
        <p><a href="#/hub/${record.id}">View in Knowledge Hub</a></p>
        <p class="dim small">${record.citations.length} Wikipedia sources · added to all module views</p>
      </div>`);
    } catch (err) {
      show('<p class="sev-medium">Wikipedia API unreachable. Check your internet connection.</p>');
    }
  }; } };

VIEWS.governance = { title: "Governance", render(el) {
  const rows = window.STORE.records.map(r =>
    `<tr><td style="font-family:var(--mono)">${esc(r.id)}</td><td>${esc(r.type)}</td>
     <td>${esc(r.owner)}</td><td>v${esc(r.version)}</td>
     <td><span class="badge ${r.access}">${esc(r.access)}</span></td>
     <td>${r.citations.length}</td><td>${esc(r.updated)}</td></tr>`).join("");
  const audit = SESSION_AUDIT.slice(-12).reverse().map(a =>
    `<tr><td>${esc(a.ts.slice(11,19))}</td><td>${esc(a.actor)}</td>
     <td style="font-family:var(--mono)">${esc(a.recordId)}</td><td>${esc(a.action)}</td></tr>`).join("");
  el.innerHTML = `<div class="card"><h2>Governance register</h2>
    <p class="dim small">Every record is owned, versioned, access-tiered and cited -
    enforced by the build (it refuses uncited data). This is the layer IT signs off on.</p>
    <div id="gov-table"><table><tr><th>id</th><th>type</th><th>owner</th><th>ver</th><th>access</th>
    <th>sources</th><th>updated</th></tr>${rows}</table></div>
    <div class="card"><h2>Session audit trail</h2>
    <table><tr><th>time</th><th>actor</th><th>record</th><th>action</th></tr>
    ${audit || "<tr><td colspan=4 class=dim>no activity yet</td></tr>"}</table></div>`; } };

function route() {
  // citation anchors (#src-cN) are not routes - let the browser scroll to them natively
  if (location.hash && !location.hash.startsWith("#/")) return;
  const [view, param] = (location.hash.replace(/^#\//, "") || "home").split("/");
  const v = VIEWS[view] || VIEWS.home;
  $("#tabs").innerHTML = Object.entries(VIEWS).map(([k, x]) =>
    `<a href="#/${k}" class="${k === view ? "on" : ""}">${x.title}</a>`).join("");
  v.render($("#app"), param);
  window.scrollTo(0, 0);
}
window.addEventListener("hashchange", route);
route();

];
var demoPathIndex = -1;
var demoHighlightTimeout = null;

function startDemoPath() {
  var card = document.getElementById("demo-path-card");
  if (!card) return;
  demoPathIndex = -1;
  card.classList.add("open");
  renderPathStops();
  var btn = document.getElementById("demo-path-hdr-btn");
  if (btn) btn.classList.remove("pulse");
}
function closeDemoPath() {
  var card = document.getElementById("demo-path-card");
  if (card) card.classList.remove("open");
  demoPathIndex = -1;
  if (demoHighlightTimeout) { clearTimeout(demoHighlightTimeout); demoHighlightTimeout = null; }
  document.querySelectorAll(".demo-highlight").forEach(function(el) { el.classList.remove("demo-highlight"); });
}
function renderPathStops() {
  var container = document.getElementById("path-stops");
  if (!container) return;
  container.innerHTML = demoPathStops.map(function(s, i) {
    var cls = "path-stop";
    if (i < demoPathIndex) cls += " done";
    else if (i === demoPathIndex) cls += " active";
    var h = '<div class="' + cls + '">' + s.label;
    if (i === demoPathIndex && s.desc) h += '<div class="path-stop-desc">' + s.desc + '</div>';
    return h + '</div>';
  }).join("");
}
function demoPathNext() {
  demoPathIndex++;
  if (demoPathIndex >= demoPathStops.length) { closeDemoPath(); return; }
  renderPathStops();
  var stop = demoPathStops[demoPathIndex];
  if (stop.view && location.hash !== "#/" + stop.view) {
    location.hash = "#/" + stop.view;
    setTimeout(function() { scrollToStop(stop); }, 150);
  } else { scrollToStop(stop); }
}
function scrollToStop(stop) {
  if (!stop.target) return;
  var el = document.getElementById(stop.target);
  if (!el) return;
  el.scrollIntoView({behavior:"smooth", block:"center"});
  el.classList.add("demo-highlight");
  if (demoHighlightTimeout) clearTimeout(demoHighlightTimeout);
  demoHighlightTimeout = setTimeout(function() { el.classList.remove("demo-highlight"); }, 2500);
}</script>
